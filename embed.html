\n---\n\n### 01\u00b726 \u00b7 Profile \u00b7 swamp.center\n*Type: profile \u00b7 Tags: `self-publishing` `zine` `poster` `berlin`*\n\nBerlin-based collective founded in 2025 by Karolina Pietrzyk and Tobias Wenig \u2014 a self-described publishing house, label, and bookshop running simultaneously, releasing zines, books, and posters with collaborators across European cultural institutions and music festivals. Visual language drawn from nature: swamp textures, twigs, algae, retro ASCII art, and found materials scanned and rebuilt as identity. Recent clients include Arsena\u0142 Gallery, Bia\u0142ystok, and Baltic Contemporary Gallery. Featured in It's Nice That, 19 January 2026.\n\n[karolinapietrzyk.info](https://karolinapietrzyk.info) \u00b7 [Feature: It's Nice That](https://www.itsnicethat.com/articles/karolina-pietrzyk-tobias-wenig-swamp-collective-graphic-design-discover-190126)\n\n---\n\n### 01\u00b726 \u00b7 Exhibition \u00b7 Condo London 2026\n*Type: exhibition \u00b7 Format: in-person \u00b7 Price: Free \u00b7 Tags: `contemporary` `collaborative` `city-wide` `london`*\n\nRan 17 January \u2013 14 February across 50 galleries in 23 London venues, from Soho and the West End to South and East London. Condo is a city-wide collaborative programme in which London galleries host international peers, sharing space and audiences \u2014 neither art fair nor festival, but a sustained month-long network of shows.\n\n[Condo London](https://www.condocomplex.org)\n\n---\n\n### 01\u00b726 \u00b7 Article \u00b7 The Graphic Trends You'll Want to Bookmark for 2026\n*Type: article \u00b7 Tags: `trends` `editorial` `mixed-media` `AI`*\n\nIt's Nice That's annual graphic design trends forecast, published 12 January. Covers five areas \u2014 typography, logo design, print, editorial, and image production \u2014 framing 2026 as a year of mixed-media resurgence. Argues that as AI image generators continue to struggle with textured and layered aesthetics, \"an overworked, scanned or heavily textured approach to image-making will only grow in 2026.\"\n\n[It's Nice That](https://www.itsnicethat.com/features/forward-thinking-graphic-trends-2026-graphic-design-120126)\n\n---\n\n### 01\u00b726 \u00b7 Profile \u00b7 Louis Garella / Studio Garella\n*Type: profile \u00b7 Tags: `visual-art` `spatial` `editorial` `paris`*\n\nParis-based designer originally from Aix-en-Provence whose hybrid practice sits across visual arts, graphic design, and spatial design \u2014 building identities, editorial work, photography, motion, and 3D from the same visual logic. Describes his process as \"a constant back-and-forth between digital and print.\" Also produces riso prints independently at Quintal Atelier. Featured in It's Nice That, 7 January 2026.\n\n[louis-garella.com](https://louis-garella.com) \u00b7 [Feature: It's Nice That](https://www.itsnicethat.com/articles/louis-garella-graphic-design-discover-070126)\n\n---\n\n### 01\u00b726 \u00b7 Book \u00b7 Alphabet Logo\n*Type: book \u00b7 Tags: `logo` `typography` `identity` `counter-print`*\n\nNew title from Counter-Print released 6 January, collecting logo and identity designs organised through the alphabet. Follows the studio's established format for categorising visual identity work \u2014 a useful addition alongside *Abstract Logo*, *Monogram Logo*, and *Animal Logo* in the series.\n\n[Counter-Print](https://www.counter-print.co.uk)\n\n---\n\n### 01\u00b726 \u00b7 Book \u00b7 Big Type \u2014 Reprint\n*Type: book \u00b7 Tags: `typography` `reprint` `counter-print`*\n\nReprint of the popular *Big Type* title, released through Counter-Print on 6 January. Collects large-scale typographic design across print, environmental, and editorial contexts \u2014 a recurring reference for type-led design practice.\n\n[Counter-Print](https://www.counter-print.co.uk)\n\n---\n\n### 01\u00b726 \u00b7 Book \u00b7 Fedrigoni 365 \u2014 2026 Edition\n*Type: book \u00b7 Tags: `paper` `annual` `typography` `counter-print`*\n\nAnnual paper swatch publication from Fedrigoni, stocked and released through Counter-Print on 6 January. Each edition showcases the Italian paper manufacturer's range through typographic and graphic treatments \u2014 as much a design object as a reference tool. A perennial in UK design studios.\n\n[Counter-Print](https://www.counter-print.co.uk)\n\n---\n\n### 01\u00b726 \u00b7 Typeface \u00b7 Amperspam 2.0\n*Type: typeface \u00b7 Tags: `novelty` `charity` `open-source`*\n\nSecond edition of agency Allen & Gerritsen's fundraising type project \u2014 three new fonts handcrafted from Spam (the tinned meat): *Amperspam Grilled Bold*, *Nibbled Neue*, and *Out The Can*. Proceeds support local food banks; the 2025 edition raised over $1,000 for Greater Boston Food Bank and Philabundance.\n\n[Creative Boom](https://www.creativeboom.com/resources/the-best-new-typefaces-for-january-2026/)\n\n---\n\n### 01\u00b726 \u00b7 Typeface \u00b7 Sets Arabic & Sets Grotesk\n*Type: typeface \u00b7 Tags: `arabic` `bilingual` `naskh` `brutalist`*\n\nDebut release from Dogray Type Foundry, designed by Sahar. A bilingual Arabic Naskh and Latin Grotesk superfamily \u2014 nine weights across four optical sizes. Sets Arabic fuses Brutalist utility with calligraphic spirit; the large optical size shifts character significantly from the text cuts.\n\n[Creative Boom](https://www.creativeboom.com/resources/the-best-new-typefaces-for-january-2026/)\n\n---\n\n### 01\u00b726 \u00b7 Typeface \u00b7 B\u00e1rur\n*Type: typeface \u00b7 Tags: `display` `debut` `branding`*\n\nDebut release from Mindt Studio. A fluid, expressive display typeface for large-scale applications \u2014 logos, editorial headlines, packaging, and posters. Legible at small sizes but most alive at scale; tactile and unmistakably handcrafted in character.\n\n[Creative Boom](https://www.creativeboom.com/resources/the-best-new-typefaces-for-january-2026/)\n\n---\n\n### 01\u00b726 \u00b7 Exhibition \u00b7 Harland Miller\n*Type: exhibition \u00b7 Format: in-person \u00b7 Price: Free \u00b7 Tags: `typography` `painting` `free` `london`*\n\nFree display at the Design Museum, London, running 10 December 2025 \u2013 25 January 2026. Miller's monumental Letter Paintings treat graphic design as both source material and structure \u2014 saturated colour fields and bespoke typefaces operating at architectural scale. Co-curated with museum director Tim Marlow; works on paper shown alongside large canvases.\n\n[Design Museum](https://designmuseum.org/exhibitions)\n\n### 01\u00b726 \u00b7 Profile \u00b7 Pedro Stolf\n*Type: profile \u00b7 Tags: `illustration` `identity` `self-initiated`*\n\nS\u00e3o Paulo-based designer and illustrator featured in It's Nice That's Ones to Watch 2026, published 29 January. Stolf's practice spans brand identity, editorial illustration, and self-initiated work characterised by bold colour, geometric reduction, and a sensibility rooted in Brazilian visual culture. One of twelve practitioners selected for the annual Ones to Watch list.\n\n[It's Nice That](https://www.itsnicethat.com/features/ones-to-watch-2026-pedro-stolf)\n\n---\n\n### 1914\u20131970 \u00b7 Profile \u00b7 Emil Ruder\n*Type: profile \u00b7 Tags: `typography` `swiss` `grid` `education` `history`*\n\nMaster of Swiss typographic pedagogy and co-originator of the International Typographic Style. His 1967 *Typographie* established the grid and white space as both functional and moral framework \u2014 order as ethics. Taught at the Allgemeine Gewerbeschule Basel and championed Univers for its systematic range of weights and widths. His pedagogy shaped designers worldwide and still underpins Swiss-derived grid methodology.\n\n[Typographie \u2014 Counter-Print](https://www.counter-print.co.uk/products/typographie) \u00b7 [Eye Magazine](https://eyemagazine.com/feature/article/swiss-connection) \u00b7 [Letterform Archive](https://letterformarchive.org)\n\n---\n\n### 1928\u20132019 \u00b7 Profile \u00b7 Wim Crouwel\n*Type: profile \u00b7 Tags: `typography` `dutch` `grid` `systems` `identity` `history`*\n\nCo-founder of Total Design \u2014 the Netherlands' first multidisciplinary consultancy \u2014 and creator of New Alphabet (1967), built entirely from horizontal and vertical strokes for CRT displays. Art directed the Stedelijk Museum poster programme for two decades. His 1972 debate with Jan van Toorn on design's social responsibility remains essential design criticism.\n\n[Design Museum](https://designmuseum.org/explore-design/all-designers/wim-crouwel) \u00b7 [A Graphic Odyssey](https://vimeo.com/106405265) \u00b7 [Eye Magazine](https://eyemagazine.com)\n\n---\n\n### Est. 1997 \u00b7 Profile \u00b7 Experimental Jetset\n*Type: profile \u00b7 Tags: `typography` `dutch` `identity` `studio` `modernism` `criticality`*\n\nAmsterdam studio \u2014 Marieke Stolk, Erwin Brinkers, Danny van den Dungen \u2014 practising conceptually rigorous graphic design grounded in Marxist cultural theory and mid-century modernism. Known for the Whitney Museum identity (2013), systematic use of Helvetica, and a body of theoretical writing. *Statements and Counter-Statements* (Spector Books, 2015) is an essential critical design text.\n\n[experimentaljetset.nl](https://www.experimentaljetset.nl) \u00b7 [Statements and Counter-Statements](https://www.spectorbooks.com/en/products/statements-counter-statements) \u00b7 [Eye Magazine](https://eyemagazine.com/feature/article/we-are-not-a-concept) \u00b7 [It's Nice That](https://www.itsnicethat.com/articles/experimental-jetset)\n\n---\n\n### 1925\u20131994 \u00b7 Profile \u00b7 Muriel Cooper\n*Type: profile \u00b7 Tags: `information-design` `digital` `systems` `education` `history`*\n\nArt director of MIT Press (1963\u20131975), designer of hundreds of MIT Press covers and the seven-bar colophon, and co-founder of the Visible Language Workshop at MIT Media Lab. Her 1994 TED demonstration of dynamic three-dimensional information spaces \u2014 weeks before her sudden death \u2014 is a founding vision of digital typography and interaction design.\n\n[AIGA Eye on Design](https://eyeondesign.aiga.org/the-woman-who-changed-the-way-we-see-digital-type/) \u00b7 [Eye Magazine](https://eyemagazine.com/feature/article/muriel-cooper) \u00b7 [Letterform Archive](https://letterformarchive.org) \u00b7 [MIT Media Lab](https://www.media.mit.edu)\n\n---\n\n### b. 1958 \u00b7 Profile \u00b7 Kenya Hara\n*Type: profile \u00b7 Tags: `japanese` `branding` `education` `minimalism` `emptiness`*\n\nArt director of Muji since 2001 and head of the Hara Design Institute at Nippon Design Center, Tokyo. Hara's practice is grounded in *ma* (\u9593) \u2014 negative space \u2014 and *white* (\u767d) as productive emptiness that invites meaning rather than imposes it. His books *White* and *Designing Design* are key texts in design philosophy. Led the Japan Pavilion at World Expo 2005.\n\n[Hara Design Institute](https://www.ndc.co.jp/hara/) \u00b7 [White \u2014 Lars M\u00fcller](https://www.lars-mueller-publishers.com/white) \u00b7 [Designing Design](https://www.lars-mueller-publishers.com/designing-design) \u00b7 [Muji](https://www.muji.com)\n\n---\n\n### 1927\u20131982 \u00b7 Profile \u00b7 Alo\u00edsio Magalh\u00e3es\n*Type: profile \u00b7 Tags: `identity` `brazilian` `culture` `history` `wayfinding`*\n\nRecife-born designer and cultural theorist who shaped Brazilian visual identity in the post-war decades. Led the PVNC (national cultural heritage preservation programme) under the Ministry of Education, directed EMBRAFILME's visual identity, and argued that design must be rooted in local craft tradition rather than imported modernism. His writing on design as cultural memory is foundational to Latin American design discourse.\n\n[Ita\u00fa Cultural](https://enciclopedia.itaucultural.org.br/pessoa9722/aloisio-magalhaes) \u00b7 [Eye Magazine](https://eyemagazine.com) \u00b7 [ESDI](https://www.esdi.uerj.br) \u00b7 [CCBB](https://culturabancodobrasil.com.br)\n\n---\n\n### b. 1960 \u00b7 Profile \u00b7 Irma Boom\n*Type: profile \u00b7 Tags: `book-design` `dutch` `typography` `material` `education`*\n\nUtrecht-born book designer whose practice treats the book as sculptural object \u2014 structure, material, weight, and sequence as expressive tools alongside type and image. Known for the 2,136-page SHV Think Book (1996, no index), a bespoke typeface for the Rijksmuseum identity, and 6cm-wide monographs. More than 50 of her books are in MoMA's permanent collection. Senior Critic at Yale School of Art.\n\n[irmaboom.nl](https://www.irmaboom.nl) \u00b7 [Eye Magazine](https://eyemagazine.com/feature/article/irma-boom-making-books) \u00b7 [Frieze](https://www.frieze.com/article/irma-boom) \u00b7 [It's Nice That](https://www.itsnicethat.com/articles/irma-boom) \u00b7 [PRINT Magazine](https://www.printmag.com/book-design/irma-boom-book-design/)\n\n---\n\n### Est. 2012 \u00b7 Profile \u00b7 Studio Moross\n*Type: profile \u00b7 Tags: `illustration` `typography` `identity` `music` `motion` `london`*\n\nLondon studio founded by Kate Moross (they/them), working at the intersection of illustration, typography, and music industry design. Defined by a bold maximalist visual language \u2014 layered lettering, saturated colour, hand-drawn type. Clients include Harry Styles, Adele, Dua Lipa, Sam Smith, and Disclosure; work spans album artwork, tour visuals, stage design, and music videos. Also operate Isolo Films for direction. A visible advocate for LGBTQ+ representation in the creative industries.\n\n[studiomoross.com](https://www.studiomoross.com) \u00b7 [It's Nice That](https://www.itsnicethat.com/tags/studio-moross) \u00b7 [AIGA Eye on Design](https://eyeondesign.aiga.org/kate-moross-studio-moross/)\n\n---\n\n### b. 1963 \u00b7 Profile \u00b7 Morag Myerscough\n*Type: profile \u00b7 Tags: `spatial` `wayfinding` `identity` `community` `colour` `sheffield`*\n\nLondon-based designer whose practice spans spatial graphics, wayfinding, public installation, and community-driven environments. Known for bringing intense colour, bold pattern, and typographic energy into health, civic, and cultural spaces \u2014 including the interiors of Sheffield Children's Hospital, designed to be joyful and legible for young patients. Her work treats space as a communicative surface, with local communities often central to the making process. Regularly cited as a model for inclusive, place-responsive design.\n\n[moragmyerscough.com](https://www.moragmyerscough.com) \u00b7 [It's Nice That](https://www.itsnicethat.com/tags/morag-myerscough) \u00b7 [Creative Review](https://www.creativereview.co.uk/morag-myerscough-sheffield-childrens-hospital/) \u00b7 [Eye Magazine](https://eyemagazine.com)\n\n---\n\n*59 entries archived \u00b7 10 upcoming \u00b7 exhibitions \u00b7 events \u00b7 profiles \u00b7 articles \u00b7 typefaces \u00b7 tools \u00b7 projects \u00b7 books \u00b7 magazines*\n\n---\n\n## Sources\n\nDesign news and critical writing used to populate this calendar.\n\n**Design news & features**\n[It's Nice That](https://www.itsnicethat.com) \u00b7 [Creative Boom](https://www.creativeboom.com) \u00b7 [Eye Magazine](https://eyemagazine.com) \u00b7 [Dezeen Design](https://www.dezeen.com/design) \u00b7 [Slanted](https://www.slanted.de) \u00b7 [Design Week](https://www.designweek.co.uk) \u00b7 [Wallpaper*](https://www.wallpaper.com)\n\n**Typography**\n[TypeCache](https://typecache.com/news) \u00b7 [Fonts In Use](https://fontsinuse.com) \u00b7 [Google Fonts](https://fonts.google.com/knowledge) \u00b7 [Adobe Fonts](https://fonts.adobe.com) \u00b7 [Typotheque](https://www.typotheque.com/blog) \u00b7 [Underware](https://www.underware.nl) \u00b7 [Are.na](https://www.are.na)\n\n**Books & publishing**\n[Counter-Print](https://www.counter-print.co.uk) \u00b7 [Unit Editions](https://www.uniteditions.com)\n\n**Events & talks**\n[Typographic Circle](https://www.typocircle.com) \u00b7 [St Bride Foundation](https://sbf.org.uk/whats-on) \u00b7 [Letterform Archive](https://letterformarchive.org/events) \u00b7 [Type@Cooper](https://cooper.edu/art/type-cooper) \u00b7 [Type Directors Club](https://tdc.org) \u00b7 [ISTD](https://www.istd.org.uk)\n\n**London exhibitions**\n[Design Museum](https://designmuseum.org/exhibitions) \u00b7 [V&A](https://www.vam.ac.uk/whats-on) \u00b7 [The Photographers' Gallery](https://thephotographersgallery.org.uk) \u00b7 [Serpentine Galleries](https://www.serpentinegalleries.org) \u00b7 [South London Gallery](https://www.southlondongallery.org) \u00b7 [Barbican](https://www.barbican.org.uk/whats-on)\n\n**Sheffield**\n[Site Gallery](https://www.sitegallery.org) \u00b7 [Sheffield Museums](https://www.sheffieldmuseums.org.uk/whats-on) \u00b7 [S1 Artspace](https://s1artspace.org) \u00b7 [Bloc Projects](https://blocprojects.org.uk) \u00b7 [SHU Gallery](https://gallery.shu.ac.uk) \u00b7 [Yorkshire Artspace](https://yorkshireartspace.org)\n\n**North**\n[Creative Tourist](https://www.creativetourist.com/exhibitions) \u00b7 [People's History Museum](https://phm.org.uk/whats-on) \u00b7 [FACT Liverpool](https://www.fact.co.uk/whats-on) \u00b7 [Leeds Art Gallery](https://museumsandgalleries.leeds.gov.uk/whats-on) \u00b7 [Photo North](https://www.photonorth.co.uk) \u00b7 [Design Festival North](https://www.designsocialnorth.co.uk)\n\n**Podcasts**\n[Scratching the Surface](https://scratchingthesurface.fm) \u2014 critical writing, theory, and history (Jarrett Fuller) \u00b7 [Design Matters](https://www.designmattersmedia.com) \u2014 long-running interview series (Debbie Millman) \u00b7 [Working File](https://www.workingfile.co.uk) \u2014 UK studio practice and process \u00b7 [Nice to Meet You](https://www.itsnicethat.com/tags/nice-to-meet-you) \u2014 It's Nice That's practitioner interviews\n\n**Video**\n[Letterform Archive](https://www.youtube.com/@LetterformArchive) \u2014 free type and lettering lectures \u00b7 [Type@Cooper](https://www.youtube.com/@TypeCooper) \u2014 free NYC typography lecture archive \u00b7 [The Futur](https://www.youtube.com/@TheFutur) \u2014 design practice and creative business (Chris Do) \u00b7 [ATypI](https://www.youtube.com/@ATypI) \u2014 international typography conference recordings\n\n## Tools\n\nA categorised reference of online tools for graphic design practice.\n\n---\n\n### Tool \u00b7 Google Fonts\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `open-source` `variable`*\n\nOver 1,500 open-source fonts for web and download, maintained by Google. Broad range from workhorse text faces to display and handwriting. The accompanying Knowledge section is a genuinely strong resource on type fundamentals, variable fonts, and using type in practice.\n\n[fonts.google.com](https://fonts.google.com) \u00b7 [Knowledge](https://fonts.google.com/knowledge)\n\n---\n\n### Tool \u00b7 Fontshare\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `open-source`*\n\nFree font library from Indian Type Foundry. Smaller and more curated than Google Fonts \u2014 around 100 families, all professional-grade. Strong in display and contemporary text faces, covering Latin and Indic scripts. Full desktop and web licensing at no cost.\n\n[fontshare.com](https://www.fontshare.com)\n\n---\n\n### Tool \u00b7 v-fonts.com\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `variable` `open-source`*\n\nThe definitive online explorer for variable fonts. Browse by axis type (weight, width, optical size, italics, custom axes), test specimens live, and filter by licence. Essential for understanding what variable fonts can do and finding ones suited to a specific brief.\n\n[v-fonts.com](https://v-fonts.com)\n\n---\n\n### Tool \u00b7 Wakamai Fondue\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `variable`*\n\nDrop any font file and get a full technical breakdown: supported characters, OpenType features, variable axes, named instances, and licence. The most complete font inspection tool available in a browser \u2014 useful when evaluating a typeface before purchasing or specifying it.\n\n[wakamaifondue.com](https://wakamaifondue.com)\n\n---\n\n### Tool \u00b7 Fontjoy\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `font-pairing`*\n\nNeural network-powered font pairing generator using Google Fonts. Set the contrast level between heading and body, lock faces you want to keep, and iterate rapidly. Useful as a starting point for pairing decisions before refining in context.\n\n[fontjoy.com](https://fontjoy.com)\n\n---\n\n### Tool \u00b7 Font Squirrel\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `open-source`*\n\nLong-running curated library of free fonts cleared for commercial use \u2014 every face is manually vetted. Smaller than Google Fonts but higher average quality; strong in text faces. Also hosts the Webfont Generator for converting desktop fonts to web formats. The reliable fallback when Google Fonts and Fontshare don't have what you need.\n\n[fontsquirrel.com](https://www.fontsquirrel.com)\n\n---\n\n### Tool \u00b7 Open Foundry\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `open-source`*\n\nCurated platform for open-source fonts selected specifically for design quality \u2014 a smaller, more discerning set than Font Squirrel. Clean interface; each font shown in a live specimen. All fonts are OFL-licensed and free for any use. Worth checking before defaulting to Google Fonts for something with more character.\n\n[open-foundry.com](https://open-foundry.com)\n\n---\n\n### Tool \u00b7 Velvetyne\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `open-source` `experimental`*\n\nFrench type collective publishing free and open-source fonts \u2014 experimental, high-quality, and consistently interesting. Smaller catalogue than commercial foundries but each release is considered and distinct. Regularly referenced in experimental and editorial design contexts. All fonts released under OFL or equivalent libre licences.\n\n[velvetyne.fr](https://velvetyne.fr)\n\n---\n\n### Tool \u00b7 The League of Moveable Type\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `open-source`*\n\nThe original high-quality open-source type foundry \u2014 launched in 2009 as a reaction to the low quality of free fonts available at the time. Small catalogue but every face is well-made: Raleway, Junction, Chunk, and League Spartan among them. All fonts released under OFL. Historically important; still actively used.\n\n[theleagueofmoveabletype.com](https://www.theleagueofmoveabletype.com)\n\n---\n\n### Tool \u00b7 Collletttivo\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `open-source` `experimental`*\n\nItalian type collective publishing free, open-source typefaces \u2014 small, focused catalogue with a strong editorial and experimental sensibility. Faces tend toward the distinctive rather than the generic; useful when a project calls for something that doesn't look like a Google Fonts default. All fonts free under libre licences.\n\n[collletttivo.it](https://collletttivo.it)\n\n---\n\n### Tool \u00b7 Use & Modify\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `open-source`*\n\nCurated catalogue of libre fonts compiled by Rapha\u00ebl Bastide \u2014 organised by formal quality rather than popularity. Strong critical framing around what makes a typeface worth using. Smaller than other repositories but higher signal-to-noise; a useful counterpoint to algorithmic recommendations. All fonts are libre-licensed.\n\n[useandmodify.com](https://useandmodify.com)\n\n---\n\n### Tool \u00b7 Future Fonts\n*Category: Typography \u00b7 Price: Paid \u00b7 Tags: `typography` `variable`*\n\nPlatform for purchasing typefaces that are still in active development \u2014 released early at lower prices, rising as the family is completed. Strong discovery tool for emerging type designers and contemporary releases not yet on mainstream foundry sites. Pay-what-you-want pricing on some faces; not free but often very affordable at early-access stage.\n\n[futurefonts.co](https://www.futurefonts.co)\n\n---\n\n### Tool \u00b7 Utopia\n*Category: Layout \u00b7 Price: Free \u00b7 Tags: `typography` `layout` `variable`*\n\nGenerates fluid type and space scales that interpolate between minimum and maximum viewport sizes using CSS clamp(). Removes arbitrary breakpoint-based sizing \u2014 the result is a coherent, proportional typographic system across all screen sizes. Accompanied by thorough documentation.\n\n[utopia.fyi](https://utopia.fyi)\n\n---\n\n### Tool \u00b7 Coolors\n*Category: Colour \u00b7 Price: Freemium \u00b7 Tags: `colour` `identity` `branding`*\n\nThe most widely-used palette generator. Generate, lock, and adjust colour combinations at speed; explore trending palettes; extract from images; check contrast. Free tier covers most needs. Useful at the start of a brand or identity project for rapid colour exploration.\n\n[coolors.co](https://coolors.co)\n\n---\n\n### Tool \u00b7 Huemint\n*Category: Colour \u00b7 Price: Free \u00b7 Tags: `colour` `identity` `ai`*\n\nAI-powered colour scheme generator that applies palettes to brand, layout, and illustration contexts rather than just showing abstract swatches. Lets you see how a combination performs on a poster, web page, or logo before committing. More contextually useful than most palette tools.\n\n[huemint.com](https://huemint.com)\n\n---\n\n### Tool \u00b7 Pigment by ShapeFactory\n*Category: Colour \u00b7 Price: Free \u00b7 Tags: `colour` `identity`*\n\nPerceptually accurate colour mixer \u2014 mixes colours as physical pigments rather than RGB values, producing results that feel natural rather than digitally muddy. Simpler and more constrained than Coolors; useful when building a palette from a single anchor colour.\n\n[pigment.shapefactory.co](https://pigment.shapefactory.co)\n\n---\n\n### Tool \u00b7 Palettte\n*Category: Colour \u00b7 Price: Free \u00b7 Tags: `colour` `identity`*\n\nDesigned for building and editing smooth, perceptually consistent colour gradients and design system palettes. Lets you visualise how colours transition across a scale, identify irregularities, and correct them. More precision-focused than Coolors; better suited to systematic colour work.\n\n[palettte.app](https://palettte.app)\n\n---\n\n### Tool \u00b7 Who Can Use\n*Category: Colour \u00b7 Price: Free \u00b7 Tags: `colour` `accessibility`*\n\nEnter a foreground and background colour and see WCAG contrast ratios across a range of simulated visual conditions \u2014 normal vision, colour blindness variants, low vision. Shows real example text rather than abstract pass/fail scores. The most intuitive accessibility colour tool available.\n\n[whocanuse.com](https://whocanuse.com)\n\n---\n\n### Tool \u00b7 Figma\n*Category: Collaboration \u00b7 Price: Freemium \u00b7 Tags: `layout` `prototyping` `vector` `collaboration`*\n\nBrowser-based design and prototyping tool, dominant across UI, branding, and editorial work. Strong variable font support, component systems, and a large plugin ecosystem. Free tier covers most solo practice; paid plans add version history and advanced sharing. Desktop apps available.\n\n[figma.com](https://www.figma.com)\n\n---\n\n### Tool \u00b7 Miro\n*Category: Collaboration \u00b7 Price: Freemium \u00b7 Tags: `collaboration` `layout`*\n\nCollaborative visual whiteboard used widely in design education, workshops, and studio practice. Useful for mapping, mood-boarding, presenting process work, and running remote critiques. Free tier allows three editable boards; integrates with Figma, Notion, and most project management tools.\n\n[miro.com](https://miro.com)\n\n---\n\n### Tool \u00b7 Are.na\n*Category: Collaboration \u00b7 Price: Freemium \u00b7 Tags: `inspiration` `collaboration` `education`*\n\nVisual research and mood-boarding platform with a slower, more considered culture than Pinterest or Behance. Widely used in design education and independent practice for building research channels, collecting references, and thinking in public. Free for limited channels; modest paid tier.\n\n[are.na](https://www.are.na)\n\n---\n\n### Tool \u00b7 Fonts In Use\n*Category: Inspiration \u00b7 Price: Free \u00b7 Tags: `typography` `inspiration` `history`*\n\nArchive of typography in real-world use \u2014 print, packaging, signage, editorial, environmental. Search by typeface, industry, format, or designer. Invaluable for understanding how a face performs in context before specifying it, and for type identification research.\n\n[fontsinuse.com](https://fontsinuse.com)\n\n---\n\n### Tool \u00b7 Typewolf\n*Category: Inspiration \u00b7 Price: Free \u00b7 Tags: `typography` `inspiration` `font-pairing`*\n\nCurated showcase of type-in-use on live websites, with type identification and pairing notes. Updated regularly; strong editorial bias. Useful for tracking how contemporary designers are using typefaces commercially, and for discovering new releases in context.\n\n[typewolf.com](https://www.typewolf.com)\n\n---\n\n### Tool \u00b7 Archives.design\n*Category: Inspiration \u00b7 Price: Free \u00b7 Tags: `history` `inspiration` `editorial`*\n\nSearchable archive of graphic design history \u2014 posters, books, magazines, identity systems, and ephemera. Strong emphasis on 20th century Swiss, German, and American modernism. Images are high resolution and downloadable. A useful complement to physical archive research.\n\n[archives.design](https://archives.design)\n\n---\n\n### Tool \u00b7 LottieFiles\n*Category: Motion \u00b7 Price: Freemium \u00b7 Tags: `motion` `open-source` `web`*\n\nPlatform for Lottie \u2014 a JSON-based animation format that renders After Effects animations at small file sizes in browser and mobile contexts. Large library of free animations; editor for customising colours and speed without After Effects. Increasingly standard for UI motion and icon animation.\n\n[lottiefiles.com](https://lottiefiles.com)\n\n---\n\n### Tool \u00b7 Rive\n*Category: Motion \u00b7 Price: Freemium \u00b7 Tags: `motion` `interactive` `web`*\n\nDesign and ship interactive, state-driven animations for web and app. Goes beyond Lottie by supporting interactivity \u2014 animations that respond to user input. Browser-based editor with a real-time runtime. Increasingly used for micro-interactions, onboarding flows, and game UI.\n\n[rive.app](https://rive.app)\n\n---\n\n### Tool \u00b7 Adobe Firefly\n*Category: AI \u00b7 Price: Freemium \u00b7 Tags: `ai` `image` `vector`*\n\nAdobe's generative AI suite \u2014 text-to-image, Generative Fill, vector recolouring, and text effects. Trained exclusively on licensed and public domain content, making outputs commercially safe \u2014 a meaningful distinction from other generative tools. Integrated into Photoshop, Illustrator, and Express.\n\n[firefly.adobe.com](https://firefly.adobe.com)\n\n---\n\n### Tool \u00b7 Khroma\n*Category: AI \u00b7 Price: Free \u00b7 Tags: `colour` `ai` `identity`*\n\nTrain your own colour palette AI by selecting 50 colours you like, then generate unlimited combinations as typography, gradients, images, and custom palettes. Results reflect your own taste rather than a generic algorithm. One of the few AI design tools that genuinely personalises to the user.\n\n[khroma.co](http://khroma.co)\n\n---\n\n### Tool \u00b7 Squoosh\n*Category: Production \u00b7 Price: Free \u00b7 Tags: `image` `open-source` `web`*\n\nGoogle's browser-based image compression tool. Compresses and converts between formats (JPEG, WebP, AVIF, PNG) with live side-by-side quality comparison. Precise control over compression settings without needing Photoshop. Useful for optimising images for web without leaving the browser.\n\n[squoosh.app](https://squoosh.app)\n\n---\n\n### Tool \u00b7 Iconify\n*Category: Production \u00b7 Price: Free \u00b7 Tags: `icons` `open-source` `web` `svg`*\n\nUnified access to over 200,000 open-source icons from 150+ icon sets \u2014 Material, Feather, Phosphor, Tabler, and many more \u2014 in a single browser-based search. Export as SVG or integrate directly into Figma via plugin. Eliminates the need to maintain separate icon library subscriptions.\n\n[iconify.design](https://iconify.design)\n\n---\n\n### Tool \u00b7 Paper Sizes\n*Category: Production \u00b7 Price: Free \u00b7 Tags: `print` `reference` `paper`*\n\nComprehensive reference for international paper sizes \u2014 ISO A, B, and C series, North American sizes, photographic formats, book trim sizes, envelope sizes, and screen resolutions \u2014 with dimensions in mm, cm, inches, and pixels. Useful when setting up new documents, briefing printers, or checking that a design is working to the correct trim size. Saves the recurring calculation of A-series subdivision ratios.\n\n[papersizes.io](https://papersizes.io)\n\n---\n\n### Tool \u00b7 Photopea\n*Category: Image \u00b7 Price: Free \u00b7 Tags: `image` `vector` `print`*\n\nFull Photoshop-equivalent editor in the browser \u2014 opens and exports PSD, AI, XCF, Sketch, and all standard image formats. Supports layers, masks, adjustment layers, smart objects, and non-destructive editing. No account required. A genuine alternative to Photoshop for asset preparation, mockup editing, and print file work.\n\n[photopea.com](https://www.photopea.com)\n\n---\n\n### Tool \u00b7 Remove.bg\n*Category: Image \u00b7 Price: Freemium \u00b7 Tags: `image` `ai`*\n\nAI-powered background removal in seconds. Upload any image, get a clean cutout with transparent background. Free tier allows unlimited use at lower resolution; paid for full resolution. Saves considerable time on asset preparation; handles hair and complex edges better than manual masking for most standard shots.\n\n[remove.bg](https://www.remove.bg)\n\n---\n\n### Tool \u00b7 Cleanup.pictures\n*Category: Image \u00b7 Price: Freemium \u00b7 Tags: `image` `ai`*\n\nAI object and element removal from photographs. Brush over anything \u2014 wires, watermarks, people, unwanted objects \u2014 and the tool in-paints the background convincingly. Useful for cleaning up reference imagery, location photography, and press shots for presentations. Free tier for basic use.\n\n[cleanup.pictures](https://cleanup.pictures)\n\n---\n\n### Tool \u00b7 TAAG \u2014 Text to ASCII Art Generator\n*Category: Experimental \u00b7 Price: Free \u00b7 Tags: `typography` `experimental` `open-source`*\n\nThe definitive text-to-ASCII art tool \u2014 over 700 font styles from monolithic slabs to tiny figlet faces, rendered in plain text. Useful for terminal interfaces, README headers, type exploration, and generative/experimental typography. Output is plain text; copy and use anywhere.\n\n[patorjk.com/software/taag](https://patorjk.com/software/taag/)\n\n---\n\n### Tool \u00b7 ASCII Art Generator\n*Category: Experimental \u00b7 Price: Free \u00b7 Tags: `image` `experimental` `typography`*\n\nConverts any uploaded image or typed text to ASCII art. Adjustable character density, colour output, and inversion. Useful for experimental typography, low-res image treatment, and translation between photographic and typographic registers \u2014 a consistent reference in print and digital design.\n\n[ascii-art-generator.org](https://www.ascii-art-generator.org)\n\n---\n\n### Tool \u00b7 HalftonePro\n*Category: Experimental \u00b7 Price: Freemium \u00b7 Tags: `print` `experimental` `image`*\n\nBrowser-based halftone effect generator with genuine CMYK control \u2014 adjust dot shape, angle, frequency, and spacing per channel. Output as SVG or PNG. More precise and design-oriented than Photoshop's built-in halftone filter. Relevant for print preparation, riso printing, and any work that engages the visual language of offset reproduction.\n\n[halftonepro.com](https://halftonepro.com)\n\n---\n\n### Tool \u00b7 Dithermark\n*Category: Experimental \u00b7 Price: Free \u00b7 Tags: `image` `experimental` `print` `open-source`*\n\nDithering tool with a wide range of algorithms \u2014 Floyd-Steinberg, ordered, pattern, random, and more \u2014 applied live in the browser. Relevant to risograph printing (which requires separated, dithered tones), pixel art, lo-fi image treatment, and understanding how images reproduce under constrained conditions. Open-source.\n\n[app.dithermark.com](https://app.dithermark.com)\n\n---\n\n### Tool \u00b7 Photomosh\n*Category: Experimental \u00b7 Price: Freemium \u00b7 Tags: `image` `motion` `experimental`*\n\nBrowser-based glitch and distortion effects for images and video \u2014 datamosh, pixel sort, blur, RGB split, VHS, and more applied in real time. Export as image, GIF, or video. Useful for experimental image treatment, motion graphics, and anything operating in the visual vocabulary of analogue degradation and digital corruption.\n\n[photomosh.com](https://photomosh.com)\n\n---\n\n### Tool \u00b7 Affinity Suite\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `vector` `image` `layout` `print` `open-source`*\n\nSerif's professional design suite \u2014 Affinity Photo, Designer, and Publisher \u2014 covering Photoshop, Illustrator, and InDesign use cases. Made fully free in 2025. Native PSD, AI, PDF, and IDML import/export. No subscription, no cloud lock-in. The most complete Adobe CC alternative available and now the default recommendation for anyone avoiding the subscription model.\n\n[affinity.serif.com](https://affinity.serif.com)\n\n---\n\n### Tool \u00b7 Inkscape\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `vector` `svg` `open-source` `print`*\n\nOpen-source vector graphics editor, SVG-native with PDF and EPS export. Actively developed; covers most Illustrator use cases including B\u00e9zier editing, typography on a path, live path effects, and pattern fills. Less polished than Affinity Designer but more powerful in some areas. Long-standing standard in open-source print and web design.\n\n[inkscape.org](https://inkscape.org)\n\n---\n\n### Tool \u00b7 GIMP\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `image` `open-source` `print`*\n\nOpen-source raster image editor \u2014 the longest-standing Photoshop alternative. Handles layers, masks, curves, channel editing, and batch processing. PSD import/export supported. Steeper learning curve than Photoshop but fully capable for print asset preparation, photo retouching, and web graphics. Scripting support via Script-Fu and Python-Fu.\n\n[gimp.org](https://www.gimp.org)\n\n---\n\n### Tool \u00b7 Krita\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `illustration` `image` `open-source`*\n\nOpen-source painting and illustration application with an exceptionally strong brush engine \u2014 widely preferred over GIMP for illustration and concept work. Supports PSD import, HDR painting, animation, and vector layers. Developed by the KDE community with consistent funding from users. The standard recommendation for digital illustration outside the Adobe ecosystem.\n\n[krita.org](https://krita.org)\n\n---\n\n### Tool \u00b7 Scribus\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `layout` `print` `open-source`*\n\nOpen-source desktop publishing application \u2014 the primary InDesign alternative. Handles multi-page layouts, master pages, styles, colour management, PDF/X export, and pre-press output. Less refined than InDesign but fully capable for print production. Widely used in community publishing, zine production, and organisations avoiding subscription software.\n\n[scribus.net](https://www.scribus.net)\n\n---\n\n### Tool \u00b7 darktable\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `image` `photography` `open-source`*\n\nOpen-source RAW photo processor and non-destructive editor \u2014 the most complete Lightroom alternative available. Handles RAW development, colour grading, lens correction, and export for all major camera manufacturers. Steep initial learning curve; powerful for anyone doing serious photographic work alongside design practice.\n\n[darktable.org](https://www.darktable.org)\n\n---\n\n### Tool \u00b7 Glyphs Mini\n*Category: Font Design \u00b7 Price: Paid (\u00a344.99) \u00b7 Tags: `typography` `font-design` `variable`*\n\nEntry-level font editor from the makers of Glyphs \u2014 the industry-standard type design application on Mac. Covers glyph drawing, spacing, kerning, and OpenType feature basics. Exports OTF and TTF. A genuine starting point for type design practice; upgrade path to the full Glyphs app when complexity demands it.\n\n[glyphsapp.com](https://glyphsapp.com)\n\n---\n\n### Tool \u00b7 FontForge\n*Category: Font Design \u00b7 Price: Free \u00b7 Tags: `typography` `font-design` `open-source`*\n\nOpen-source font editor \u2014 the primary free alternative to Glyphs and FontLab. Handles glyph drawing, spacing, kerning, OpenType features, and font format conversion (OTF, TTF, WOFF, SVG fonts). Dated interface but fully capable; widely used in academic and open-source type projects. Runs on Mac, Windows, and Linux.\n\n[fontforge.org](https://fontforge.org)\n\n---\n\n### Tool \u00b7 Metaflop Modulator\n*Category: Font Design \u00b7 Price: Free \u00b7 Tags: `typography` `font-design` `experimental` `open-source`*\n\nParametric type design tool based on Metafont \u2014 adjust a set of sliders (stroke width, serif size, x-height, spacing) to generate a complete typeface from a mathematical model. Produces usable fonts and is a strong conceptual tool for understanding how typeface parameters interact. Outputs OTF directly in browser.\n\n[metaflop.com/modulator](https://www.metaflop.com/modulator)\n\n---\n\n### Tool \u00b7 Prototypo\n*Category: Font Design \u00b7 Price: Freemium \u00b7 Tags: `typography` `font-design` `variable`*\n\nBrowser-based parametric font editor. Adjust letterform parameters \u2014 contrast, width, x-height, ascenders, curvature \u2014 across a full character set simultaneously. Exports OTF. Useful for rapid type exploration and for designers wanting to understand type construction without committing to a full type design workflow.\n\n[prototypo.io](https://www.prototypo.io)\n\n---\n\n### Tool \u00b7 TouchDesigner\n*Category: Creative Coding \u00b7 Price: Freemium \u00b7 Tags: `motion` `interactive` `generative` `experimental`*\n\nVisual programming environment for real-time interactive media \u2014 live visuals, installations, projection mapping, data-driven graphics, and generative systems. Node-based workflow; no traditional coding required for most applications. Free non-commercial licence covers educational and personal use fully. Industry standard for live performance and installation work.\n\n[derivative.ca](https://derivative.ca)\n\n---\n\n### Tool \u00b7 Blender\n*Category: Creative Coding \u00b7 Price: Free \u00b7 Tags: `motion` `generative` `open-source` `image`*\n\nOpen-source 3D creation suite covering modelling, rigging, animation, rendering, compositing, and motion graphics. Free, no subscription. Used extensively for 3D type, abstract motion design, product visualisation, and CGI for print and broadcast. Large community and tutorial ecosystem; Geometry Nodes system enables parametric and generative 3D work.\n\n[blender.org](https://www.blender.org)\n\n---\n\n### Tool \u00b7 p5.js\n*Category: Creative Coding \u00b7 Price: Free \u00b7 Tags: `generative` `interactive` `open-source` `web`*\n\nJavaScript library for creative coding in the browser \u2014 the web port of Processing. Draw, animate, and interact with code in a browser-based editor. Widely taught in design education as an entry point to generative graphics, data visualisation, and computational form. Extensive documentation and an active community of designers and artists.\n\n[p5js.org](https://p5js.org)\n\n---\n\n### Tool \u00b7 Cables.gl\n*Category: Creative Coding \u00b7 Price: Freemium \u00b7 Tags: `generative` `interactive` `motion` `web`*\n\nBrowser-based visual programming environment for real-time WebGL \u2014 similar conceptual territory to TouchDesigner but runs entirely in the browser. Node-based; no install required. Strong for generative graphics, interactive web experiences, and shader-based visual work. Outputs can be embedded directly in websites. Free for public projects.\n\n[cables.gl](https://cables.gl)\n\n---\n\n### Tool \u00b7 Cavalry\n*Category: Creative Coding \u00b7 Price: Freemium \u00b7 Tags: `motion` `generative` `vector`*\n\n2D motion graphics application designed as a data-driven alternative to After Effects. Procedural, non-destructive workflow \u2014 link any parameter to data, expressions, or other parameters. Faster and more logical for design-led motion work than AE; particularly strong for kinetic typography, animated brand systems, and infographic animation. Free tier for non-commercial use.\n\n[cavalry.scenegroup.co](https://cavalry.scenegroup.co)\n\n---\n\n### Tool \u00b7 NotebookLM\n*Category: AI \u00b7 Price: Free \u00b7 Tags: `ai` `research` `audio` `education`*\n\nGoogle's AI research assistant that works from your own documents. Upload your brief, lecture slides, articles, and reading list \u2014 NotebookLM synthesises across all of them, answers questions in context, and generates audio overviews you can listen to while sketching. A genuine study tool: use it to interrogate theory you don't fully understand, map connections across your research, or prep for a crit by asking it hard questions about your own project.\n\n[notebooklm.google.com](https://notebooklm.google.com)\n\n---\n\n### Tool \u00b7 ChatGPT\n*Category: AI \u00b7 Price: Free / Plus \u00b7 Tags: `ai` `writing` `research` `education`*\n\nOpenAI's general-purpose AI assistant. Useful across the whole design process: generating multiple concept directions quickly, writing copy for mock briefs, explaining design history you're fuzzy on, or working through an artist statement. The free tier (GPT-4o) covers most student tasks. Works best as a sounding board for early-stage thinking \u2014 useful for articulating ideas before you're ready to share them more widely.\n\n[chatgpt.com](https://chatgpt.com)\n\n---\n\n### Tool \u00b7 Claude\n*Category: AI \u00b7 Price: Free / Pro \u00b7 Tags: `ai` `writing` `research` `education`*\n\nAnthropic's AI assistant, strong on extended reasoning, careful analysis, and long documents. Particularly useful for students working on dissertation chapters, written rationales, or reflective writing \u2014 upload a full draft and ask for structural critique. Also good for brief deconstruction: paste a project brief and ask Claude to identify the unstated assumptions, constraints, and opportunities you might otherwise miss.\n\n[claude.ai](https://claude.ai)\n\n---\n\n### Tool \u00b7 Perplexity\n*Category: AI \u00b7 Price: Free / Pro \u00b7 Tags: `ai` `research` `search`*\n\nAI-powered search that returns answers with cited sources \u2014 closer to a research tool than a chatbot. Strong for design history questions, tracing the lineage of a visual style, or finding primary sources for an essay. Unlike general AI tools it doesn't confabulate silently: every answer links to the pages it drew from. Use it where you'd usually spend 20 minutes Googling and cross-referencing.\n\n[perplexity.ai](https://www.perplexity.ai)\n\n---\n\n### Tool \u00b7 Midjourney\n*Category: AI \u00b7 Price: Subscription \u00b7 Tags: `ai` `image` `moodboard` `concept`*\n\nText-to-image model producing high-quality, art-directed imagery. For students, most useful in early concept stages: generate 50 visual directions in an hour rather than spending the same time hunting stock imagery. Strong on atmosphere, texture, and compositional mood. Accessed via Discord; monthly subscription required. Use it to pressure-test a brief's visual territory, not to produce final assets.\n\n[midjourney.com](https://www.midjourney.com)\n\n---\n\n### Tool \u00b7 Ideogram\n*Category: AI \u00b7 Price: Free / Pro \u00b7 Tags: `ai` `image` `typography` `concept`*\n\nAI image generator with noticeably stronger text rendering than most models \u2014 useful for generating typographic compositions, poster concepts, and logotype explorations to sketch from. Free tier is generous. Good for producing rough visual hypotheses quickly: generate 20 poster directions from a brief summary, identify which compositional logic feels right, then develop that by hand.\n\n[ideogram.ai](https://ideogram.ai)\n\n---\n\n### Tool \u00b7 Runway\n*Category: AI \u00b7 Price: Freemium \u00b7 Tags: `ai` `motion` `video` `concept`*\n\nAI video generation and editing platform. For students, most useful for bringing static work to life in presentations: animate a poster, create an atmospheric video backdrop for a brand identity, or produce a moving-image mood piece without filming anything. Gen-3 Alpha produces short video clips from text or image prompts. Free tier allows limited generations; sufficient for presentation work.\n\n[runwayml.com](https://runwayml.com)\n\n---\n\n### Tool \u00b7 Flux\n*Category: AI \u00b7 Price: Free (playground) / Pay-per-use \u00b7 Tags: `ai` `image` `open-source` `concept`*\n\nState-of-the-art open-source image generation model from Black Forest Labs. Produces high-quality, photorealistic and stylised imagery with strong prompt fidelity. Free playground available for testing; API access is pay-per-use ($0.03\u20130.04 per image) with no subscription required. Noticeably better than earlier open models at handling composition, detail, and text within images. The open weights are free to run locally via ComfyUI.\n\n[blackforestlabs.ai](https://blackforestlabs.ai)\n\n---\n\n### Tool \u00b7 Recraft\n*Category: AI \u00b7 Price: Free / Pro \u00b7 Tags: `ai` `image` `vector` `concept`*\n\nAI image generator built specifically for design use: generates vector illustrations, icons, brand imagery, and UI mockups alongside raster output. Supports consistent style presets across generations \u2014 useful for maintaining visual coherence across a project. Free tier is generous. Stronger than general-purpose models for flat graphic, iconographic, and editorial illustration styles.\n\n[recraft.ai](https://www.recraft.ai)\n\n---\n\n### Tool \u00b7 ComfyUI\n*Category: AI \u00b7 Price: Free \u00b7 Tags: `ai` `image` `open-source` `generative`*\n\nNode-based interface for running Stable Diffusion and Flux models locally. Highly customisable \u2014 chain together models, ControlNet, upscalers, and custom nodes in a visual workflow. Steeper learning curve than browser tools but gives full control over the generation pipeline with no usage limits. Runs on consumer hardware with a capable GPU; free and open-source throughout.\n\n[github.com/comfyanonymous/ComfyUI](https://github.com/comfyanonymous/ComfyUI)\n\n---\n\n### Tool \u00b7 Krea\n*Category: AI \u00b7 Price: Free / Pro \u00b7 Tags: `ai` `image` `realtime` `concept`*\n\nReal-time AI image generation \u2014 prompts update the canvas as you type, and you can sketch directly into the generation loop. Particularly useful for rapid concept iteration: sketch a rough composition, describe the visual language, and see results instantly. Also supports image enhancement and upscaling. Free tier covers most student use cases.\n\n[krea.ai](https://www.krea.ai)\n\n---\n\n### Tool \u00b7 Magnific\n*Category: AI \u00b7 Price: Subscription \u00b7 Tags: `ai` `image` `upscaling` `production`*\n\nAI upscaler that adds genuine detail rather than just interpolating pixels \u2014 useful for taking a low-resolution AI generation or sketch and producing print-ready output. Supports creativity levels from faithful upscale to imaginative reinterpretation of the source. Subscription-based; useful at the production end of a project when a concept needs to go to print or large-format output.\n\n[magnific.ai](https://magnific.ai)\n\n---\n\n### Tool \u00b7 Pika\n*Category: AI \u00b7 Price: Free / Pro \u00b7 Tags: `ai` `motion` `video` `concept`*\n\nText-to-video and image-to-video generation tool. Alongside Runway, one of the more accessible options for students producing animated brand presentations, moving-image concepts, or short atmospheric clips. Strong on animating still images \u2014 useful for bringing a poster or photograph to life without filming. Free tier allows a useful number of generations per day.\n\n[pika.art](https://pika.art)\n\n---\n";
const INLINE_GLOSSARY = "# Design & AI Glossary\n\n> **AI:** Concepts, Models, Training, Safety, Tools \u00b7 **Design:** Typography, Type Design, Book Design, Grid & Layout, Print Production, Wayfinding\n\n---\n\n## Contents\n\n[A](#a) \u00b7 [B](#b) \u00b7 [C](#c) \u00b7 [D](#d) \u00b7 [E](#e) \u00b7 [F](#f) \u00b7 [G](#g) \u00b7 [H](#h) \u00b7 [I](#i) \u00b7 [J](#j) \u00b7 [K](#k) \u00b7 [L](#l) \u00b7 [M](#m) \u00b7 [N](#n) \u00b7 [O](#o) \u00b7 [P](#p) \u00b7 [Q](#q) \u00b7 [R](#r) \u00b7 [S](#s) \u00b7 [T](#t) \u00b7 [U](#u) \u00b7 [V](#v) \u00b7 [W](#w) \u00b7 [X](#x) \u00b7 [Y](#y) \u00b7 [Z](#z)\n\n---\n\n## A\n\n### Agent / AI Agent\n*Category: concept \u00b7 Tags: `agentic` `autonomous` `tools`*\n\nAn autonomous system that perceives its environment, makes decisions, and executes multi-step tasks using tools (web search, code execution, APIs) without requiring human input at each step. Powers products like Claude Code, Devin, and AutoGPT. [[1]](#bibliography)\n\n---\n\n### Agentic RAG\n*Category: concept \u00b7 Tags: `RAG` `agentic` `retrieval`*\n\nAn advanced retrieval-augmented generation pattern where the agent dynamically decides what to retrieve, when, and how to use retrieved context \u2014 rather than simple one-shot retrieval. Key for enterprise AI systems.\n\n---\n\n### Computer-Using Agent `CUA`\n*Category: concept \u00b7 Tags: `agentic` `autonomous` `2026`*\n\nAn AI model trained to interact with graphical user interfaces by perceiving screenshots, reasoning about next steps, and executing actions \u2014 clicking, scrolling, typing \u2014 without API access. OpenAI's Operator is the first widely-released CUA product (early 2026). Represents a significant shift from text-only agents to systems that can operate any software a human can.\n\n---\n\n### Multi-Agent System `MAS`\n*Category: concept \u00b7 Tags: `agentic` `orchestration` `2026`*\n\nA system comprising multiple specialised AI agents coordinating toward a shared goal, each handling distinct subtasks. One agent might search the web, another write code, another verify results \u2014 coordinated by an orchestrator. Increasingly common in enterprise AI deployments as an alternative to single large models for complex, parallel workflows.\n\n---\n\n### Bounded Autonomy\n*Category: safety \u00b7 Tags: `agentic` `governance` `safety`*\n\nAn operational framework that defines explicit limits on what an autonomous AI agent can do, which decisions require human review, and what actions are off-limits. Central to safely deploying agents in enterprise contexts where mistakes have real consequences. Contrasts with fully autonomous systems; represents the current industry consensus on responsible agentic AI deployment.\n\n---\n\n### Alignment\n*Category: safety \u00b7 Tags: `research` `values`*\n\nThe challenge of ensuring AI systems pursue goals that are beneficial and consistent with human values and intentions. Encompasses both capability alignment (doing what we ask) and value alignment (wanting what we want). Central research area at Anthropic, DeepMind, and OpenAI. [[2]](#bibliography)\n\n---\n\n### AGI `Artificial General Intelligence`\n*Category: concept \u00b7 Tags: `safety` `research` `policy`*\n\nHypothetical AI that matches or exceeds human cognitive ability across all domains \u2014 not just specific tasks. A long-standing goal of AI research and central to debates about AI risk and timelines. Contrasted with narrow AI (current systems) and ASI (artificial superintelligence). No consensus exists on what would constitute AGI or when it might arrive.\n\n---\n\n### Attention Mechanism\n*Category: concept \u00b7 Tags: `transformer` `architecture`*\n\nA neural network module that allows a model to weigh the importance of different input tokens when generating each output token. Foundation of the Transformer architecture; enables long-range dependency modeling. [[3]](#bibliography)\n\n---\n\n### Autoregressive Model `AR`\n*Category: model \u00b7 Tags: `LLM` `generation`*\n\nA generative model that predicts the next token based on all previously generated tokens. Most large language models (GPT, Claude, Llama) are autoregressive. Contrasts with diffusion models, which iteratively denoise. [[4]](#bibliography)\n\n---\n\n## B\n\n### Benchmark\n*Category: concept \u00b7 Tags: `evaluation` `metrics`*\n\nA standardized test used to evaluate model capabilities. Common benchmarks include MMLU (knowledge), HumanEval (code), MATH, GSM8K, SWE-bench (software engineering), and GPQA (graduate-level reasoning).\n\n---\n\n### BERT\n*Category: model \u00b7 Tags: `encoder` `NLP` `Google`*\n\nBidirectional Encoder Representations from Transformers. Google's 2018 model trained via masked language modeling; foundational for NLP tasks like classification and entity recognition. Encoder-only, unlike GPT's decoder-only architecture. [[5]](#bibliography)\n\n---\n\n### Bias\n*Category: safety \u00b7 Tags: `fairness` `alignment`*\n\nSystematic skew in model outputs stemming from training data distributions, labeler preferences, or RLHF. Can manifest as demographic bias, political leaning, or factual distortion. Active area of red-teaming and evaluation.\n\n---\n\n### BPE `Byte Pair Encoding`\n*Category: concept \u00b7 Tags: `tokenization` `NLP`*\n\nA tokenization algorithm that iteratively merges frequent character pairs into single tokens. Used by GPT models and many others to balance vocabulary size with sequence length. [[6]](#bibliography)\n\n---\n\n## C\n\n### Chain-of-Thought Prompting `CoT`\n*Category: concept \u00b7 Tags: `prompting` `reasoning`*\n\nA prompting technique where the model is prompted to reason step-by-step before giving a final answer. Dramatically improves performance on math, logic, and multi-step reasoning tasks. Extended variants include Self-Consistency and Tree-of-Thought. [[7]](#bibliography)\n\n---\n\n### Claude\n*Category: model \u00b7 Tags: `Anthropic` `LLM` `safety`*\n\nAnthropic's family of large language models, including Claude 3 Opus, Sonnet, Haiku, and the Claude 4 series. Designed with Constitutional AI and RLHF for safety and helpfulness. Features long context windows (up to 200K tokens) and strong reasoning.\n\n---\n\n### CBRN `Chemical, Biological, Radiological, Nuclear`\n*Category: safety \u00b7 Tags: `dual-use` `policy`*\n\nThe four categories of weapons of mass destruction that represent the most severe dual-use risk from frontier AI. Evaluations for CBRN uplift \u2014 whether a model meaningfully assists in creating such weapons \u2014 are a core component of frontier lab safety assessments and government AI policy frameworks, including Anthropic's RSP. [[8]](#bibliography)\n\n---\n\n### Constitutional AI `CAI`\n*Category: safety \u00b7 Tags: `Anthropic` `training`*\n\nAnthropic's training methodology where models critique and revise their outputs against a set of principles (a 'constitution') via AI feedback. Reduces reliance on human labeling for safety while maintaining helpfulness. [[9]](#bibliography)\n\n---\n\n### Context Window\n*Category: concept \u00b7 Tags: `architecture` `memory`*\n\nThe maximum number of tokens a model can process in a single interaction (input + output). Ranges from 4K tokens (older GPT-3) to 2M tokens (Gemini 1.5 Pro). Larger contexts enable document analysis, long conversations, and complex agent tasks.\n\n---\n\n### CUDA `Compute Unified Device Architecture`\n*Category: tool \u00b7 Tags: `GPU` `hardware` `NVIDIA`*\n\nNVIDIA's parallel computing platform enabling GPU-accelerated deep learning. Essential infrastructure for training and inference of large models; most major frameworks (PyTorch, JAX) are CUDA-optimized.\n\n---\n\n## D\n\n### DeepSeek\n*Category: model \u00b7 Tags: `open-source` `reasoning` `China`*\n\nA series of highly capable open-source Chinese AI models (DeepSeek-V3, R1) that achieved frontier-level performance at significantly lower training cost, triggering widespread discussion about AI efficiency and accessibility in early 2025. [[10]](#bibliography)\n\n---\n\n### Dual-use\n*Category: safety \u00b7 Tags: `policy`*\n\nAI capabilities or research that can serve both beneficial and harmful purposes \u2014 e.g., protein-folding models that advance medicine but could also aid bioweapon design. A central tension in AI safety policy: how to share powerful capabilities openly while limiting catastrophic misuse. Governs export controls, publication norms, and access decisions at frontier labs.\n\n---\n\n### Diffusion Model\n*Category: model \u00b7 Tags: `generative` `image` `audio`*\n\nA generative model that learns to reverse a noise-adding process. State-of-the-art for image (Stable Diffusion, DALL-E 3, Flux), audio, and video generation. Contrasts with autoregressive models used in text generation. [[11]](#bibliography)\n\n---\n\n### Direct Preference Optimization `DPO`\n*Category: training \u00b7 Tags: `RLHF` `alignment` `fine-tuning`*\n\nA fine-tuning method that trains models to prefer better outputs over worse ones directly from comparison data, without requiring a separate reward model. A simpler alternative to PPO-based RLHF. Widely adopted since 2023. [[12]](#bibliography)\n\n---\n\n### Distillation\n*Category: training \u00b7 Tags: `compression` `efficiency`*\n\nTraining a smaller 'student' model to mimic the outputs of a larger 'teacher' model. Produces compact models with performance close to the original. DeepSeek-R1's distilled versions and Phi-3 Mini use this approach. [[13]](#bibliography)\n\n---\n\n## E\n\n### Embedding\n*Category: concept \u00b7 Tags: `vector` `semantic search` `RAG`*\n\nA dense numerical vector representing a token, sentence, or document in high-dimensional space. Similar concepts have similar embeddings. Foundational for semantic search, RAG, and clustering. Models: text-embedding-3, Cohere Embed. [[14]](#bibliography)\n\n---\n\n### Emergent Abilities\n*Category: concept \u00b7 Tags: `scaling` `research`*\n\nCapabilities that appear suddenly in models at certain scale thresholds \u2014 not present in smaller models but arising at larger sizes. Examples include few-shot learning and chain-of-thought reasoning. [[15]](#bibliography)\n\n---\n\n### Evals\n*Category: concept \u00b7 Tags: `benchmarks` `safety` `metrics`*\n\nSystematic methods for measuring model capabilities and limitations. Includes automated benchmarks, human preference studies, red-teaming, and LLM-as-judge frameworks. Critical for model development and safety.\n\n---\n\n### Extended Thinking\n*Category: concept \u00b7 Tags: `reasoning` `CoT` `inference`*\n\nA model capability (used in Claude 3.7 Sonnet, OpenAI o1/o3) where the model runs an internal chain-of-thought reasoning process before producing its final answer. Substantially improves performance on hard math, coding, and science problems. [[10]](#bibliography) [[16]](#bibliography)\n\n---\n\n## F\n\n### Few-Shot Learning\n*Category: concept \u00b7 Tags: `prompting` `in-context learning`*\n\nA model's ability to perform a new task given only a few examples in the prompt (in-context learning). Emerged prominently with GPT-3. Distinguished from zero-shot (no examples) and many-shot (many examples) learning. [[4]](#bibliography)\n\n---\n\n### Fine-tuning `FT`\n*Category: training \u00b7 Tags: `LoRA` `adaptation`*\n\nContinuing training a pre-trained model on a smaller, task-specific dataset to specialize its behavior. Techniques include full fine-tuning, LoRA, QLoRA, and instruction tuning. Used to create domain-specific or behavior-customized models.\n\n---\n\n### Flash Attention\n*Category: concept \u00b7 Tags: `attention` `efficiency` `GPU`*\n\nAn IO-aware, memory-efficient exact attention algorithm that dramatically speeds up Transformer training by recomputing rather than storing large attention matrices. FlashAttention-3 (2024) is standard in modern training stacks. [[17]](#bibliography)\n\n---\n\n### Foundation Model `FM`\n*Category: model \u00b7 Tags: `LLM` `pretraining` `transfer`*\n\nA large model trained on broad data at scale, designed to be adapted to many downstream tasks. Term coined by Stanford HAI in 2021. GPT-4, Claude 3, Gemini, and Llama 3 are foundation models. [[18]](#bibliography)\n\n---\n\n### Frontier Model\n*Category: model \u00b7 Tags: `safety` `policy` `scaling`*\n\nModels at the cutting edge of AI capabilities, representing the most powerful AI systems available at a given time. Subject to specific safety requirements under the EU AI Act and Anthropic's Responsible Scaling Policy.\n\n---\n\n## G\n\n### Gemini\n*Category: model \u00b7 Tags: `Google` `multimodal` `LLM`*\n\nGoogle DeepMind's flagship multimodal AI model family (Gemini 1.5 Pro, Flash, Ultra, 2.0). Features natively multimodal architecture and extremely long context (up to 2M tokens). Powers Google's AI products. [[19]](#bibliography)\n\n---\n\n### Generative AI `Gen AI`\n*Category: concept \u00b7 Tags: `generation` `LLM` `multimodal`*\n\nAI systems that can generate new content \u2014 text, images, audio, video, code, or structured data \u2014 rather than simply classifying or predicting. Powered by LLMs, diffusion models, and other deep learning architectures.\n\n---\n\n### GPT `Generative Pre-trained Transformer`\n*Category: model \u00b7 Tags: `OpenAI` `LLM` `transformer`*\n\nOpenAI's flagship LLM series. GPT-3 (2020) showed emergent few-shot abilities; GPT-4 (2023) set multimodal benchmarks; GPT-4o (2024) added real-time voice and vision capabilities. [[4]](#bibliography)\n\n---\n\n### Guardrails\n*Category: safety \u00b7 Tags: `moderation` `deployment`*\n\nSafety mechanisms applied around or within AI systems to constrain outputs. Can be implemented via RLHF, system prompts, output classifiers, or moderation APIs. Tools: Llama Guard, NeMo Guardrails, Guardrails AI.\n\n---\n\n## H\n\n### Hallucination\n*Category: concept \u00b7 Tags: `reliability` `safety` `factuality`*\n\nWhen an LLM confidently generates factually incorrect, fabricated, or unsupported information. A key limitation of autoregressive models. Mitigated via RAG, grounding, RLHF, and verification chains. [[20]](#bibliography)\n\n---\n\n### HumanEval\n*Category: concept \u00b7 Tags: `benchmark` `code` `evaluation`*\n\nA code generation benchmark from OpenAI consisting of 164 Python programming problems. Models are evaluated on pass@k metric. Widely used but increasingly augmented by harder benchmarks like SWE-bench and LiveCodeBench. [[21]](#bibliography)\n\n---\n\n### Hyperparameters\n*Category: training \u00b7 Tags: `optimization`*\n\nConfiguration values set before training begins that control the learning process: learning rate, batch size, number of layers, attention heads, context length. Chosen via ablation studies or automated hyperparameter search.\n\n---\n\n## I\n\n### In-Context Learning `ICL`\n*Category: concept \u00b7 Tags: `prompting` `emergent` `few-shot`*\n\nThe ability of LLMs to learn new tasks from examples provided in the prompt, without updating model weights. A defining emergent property of large models. Includes few-shot, many-shot, and instruction-following scenarios. [[4]](#bibliography)\n\n---\n\n### Inference\n*Category: concept \u00b7 Tags: `deployment` `efficiency` `production`*\n\nRunning a trained model on new inputs to generate outputs. Distinguished from training, which updates model weights. Inference cost, latency, and throughput are critical production concerns, optimized via quantization, KV caching, speculative decoding, and batching.\n\n---\n\n### Instruction Tuning\n*Category: training \u00b7 Tags: `fine-tuning` `alignment` `RLHF`*\n\nFine-tuning a base language model on a dataset of instruction-response pairs to make it follow natural language instructions reliably. Foundation of modern AI assistants; used by InstructGPT, Alpaca, and all major chat models. [[22]](#bibliography)\n\n---\n\n### Interpretability\n*Category: safety \u00b7 Tags: `mechanistic` `research`*\n\nResearch aimed at understanding what computations occur inside neural networks. Includes mechanistic interpretability (circuit analysis, feature visualization) and Anthropic's work on superposition and monosemantic features. Key for AI safety. [[23]](#bibliography)\n\n---\n\n## J\n\n### JAX\n*Category: tool \u00b7 Tags: `framework` `Google` `research`*\n\nGoogle's numerical computing library for high-performance ML research. Offers automatic differentiation and XLA JIT compilation. Used by Google DeepMind for Gemini training; favored in research settings over PyTorch.\n\n---\n\n### JSON Mode\n*Category: concept \u00b7 Tags: `API` `structured output` `production`*\n\nA structured output feature in LLM APIs (OpenAI, Anthropic) that constrains model outputs to valid JSON. Essential for building reliable pipelines where models need to produce machine-readable structured data.\n\n---\n\n## K\n\n### Knowledge Distillation `KD`\n*Category: training \u00b7 Tags: `distillation` `efficiency` `compression`*\n\nTraining a smaller model to replicate the behavior of a larger teacher model by learning from its output distributions (soft targets) rather than hard labels. Achieves near-teacher performance at a fraction of the compute. [[13]](#bibliography)\n\n---\n\n### KV Cache `Key-Value Cache`\n*Category: concept \u00b7 Tags: `inference` `attention` `efficiency`*\n\nStores computed attention key and value tensors from previous tokens during autoregressive generation, avoiding redundant computation. Critical for inference speed and the basis for efficient long-context serving.\n\n---\n\n## L\n\n### LangChain\n*Category: tool \u00b7 Tags: `framework` `agentic` `open-source`*\n\nAn open-source Python/JavaScript framework for building LLM-powered applications. Provides abstractions for chains, agents, memory, and integrations with vector stores, APIs, and tools. Widely used for rapid prototyping.\n\n---\n\n### LLM-as-judge\n*Category: concept \u00b7 Tags: `evaluation` `evals` `benchmark`*\n\nUsing a capable LLM (such as GPT-4 or Claude) to automatically evaluate the quality of outputs from another model, replacing or supplementing human raters. Widely used in preference dataset creation and automated evals. Known limitation: judge models tend to favour outputs stylistically similar to their own. [[24]](#bibliography)\n\n---\n\n### Large Language Model `LLM`\n*Category: model \u00b7 Tags: `foundation model` `NLP` `transformer`*\n\nA neural network with billions of parameters trained on massive text corpora using self-supervised learning. Capable of generation, reasoning, translation, summarization, and code. Examples: GPT-4, Claude 3, Gemini, Llama 3, Mistral.\n\n---\n\n### Llama\n*Category: model \u00b7 Tags: `Meta` `open-source` `LLM`*\n\nMeta AI's open-weight large language model series. Llama 3.1 (405B) achieved near-frontier performance and democratized open-source AI. Llama 3.3 70B (late 2024) is among the most capable open models for its size. [[25]](#bibliography)\n\n---\n\n### LoRA `Low-Rank Adaptation`\n*Category: training \u00b7 Tags: `fine-tuning` `PEFT` `efficiency`*\n\nA parameter-efficient fine-tuning method that inserts small trainable low-rank matrices into model layers, updating only ~1% of parameters. Enables fine-tuning on consumer GPUs. Extended by QLoRA, DoRA. [[26]](#bibliography)\n\n---\n\n## M\n\n### Mechanistic Interpretability `Mech Interp`\n*Category: safety \u00b7 Tags: `interpretability` `Anthropic`*\n\nA subfield of AI safety research that reverse-engineers the algorithms implemented by neural networks at the level of individual neurons, circuits, and features. Anthropic's team has made significant advances, including sparse autoencoder work. [[23]](#bibliography)\n\n---\n\n### Mixture of Experts `MoE`\n*Category: model \u00b7 Tags: `architecture` `efficiency` `sparse`*\n\nA model architecture where a router network activates only a subset of specialized 'expert' sub-networks for each token. Allows very high parameter counts with lower active compute. Used in GPT-4, Mixtral, and Grok. [[27]](#bibliography)\n\n---\n\n### Multimodal\n*Category: concept \u00b7 Tags: `vision` `audio` `generation` `LLM`*\n\nAI systems capable of processing or generating multiple types of data \u2014 text, images, audio, and video \u2014 within a single model. Modern examples include GPT-4o, Gemini 1.5, and Claude 3 (vision). Contrasts with unimodal models that handle only one data type.\n\n---\n\n### MMLU `Massive Multitask Language Understanding`\n*Category: concept \u00b7 Tags: `benchmark` `evaluation` `knowledge`*\n\nA 57-subject knowledge benchmark testing models across STEM, humanities, law, medicine, and more. Once a key frontier benchmark; now generally saturated by top models. Succeeded by MMLU-Pro. [[28]](#bibliography)\n\n---\n\n### Model Context Protocol `MCP`\n*Category: tool \u00b7 Tags: `Anthropic` `agentic` `protocol` `tools`*\n\nAnthropic's open standard (2024) for connecting AI assistants to external tools, data sources, and services via a standardized client-server protocol. Rapidly adopted by major IDEs, databases, and API providers. [[29]](#bibliography)\n\n---\n\n### Moltbook\n*Category: tool \u00b7 Tags: `agentic` `social` `multi-agent` `2026` `experimental`*\n\nAn experimental social media platform launched in early 2026, designed exclusively for autonomous AI agents to interact \u2014 posting, commenting, upvoting, and forming communities. Humans can observe but cannot fully participate. Built on the OpenClaw agent framework. Represents a new frontier in agent-to-agent communication and emergent AI social behaviour. [[30]](#bibliography)\n\n---\n\n### Multi-Head Attention `MHA`\n*Category: concept \u00b7 Tags: `transformer` `attention` `architecture`*\n\nA Transformer component that runs multiple attention operations in parallel (each 'head' attends to different aspects of the input) and concatenates the results. Allows the model to capture diverse dependency patterns simultaneously. [[3]](#bibliography)\n\n---\n\n## N\n\n### Neural Network `NN`\n*Category: concept \u00b7 Tags: `architecture` `deep learning` `foundational`*\n\nA computational model composed of layers of interconnected nodes (neurons) that learn to transform inputs into outputs via gradient-based training. The foundation of all modern AI: LLMs, diffusion models, vision models, and RL systems are all neural networks. Deep neural networks have many stacked layers; their depth is what enables learning complex hierarchical representations.\n\n---\n\n### Natural Language Processing `NLP`\n*Category: concept \u00b7 Tags: `linguistics` `transformer` `text`*\n\nThe field of AI concerned with enabling computers to understand, interpret, and generate human language. Modern NLP is dominated by transformer-based LLMs, which have replaced earlier statistical and RNN-based approaches.\n\n---\n\n### Next Token Prediction `NTP`\n*Category: concept \u00b7 Tags: `pretraining` `autoregressive` `LLM`*\n\nThe primary pre-training objective for autoregressive LLMs: predict the probability distribution over the next token given all preceding tokens. Deceptively simple task that leads to the emergence of complex reasoning and world knowledge.\n\n---\n\n## O\n\n### OpenAI o-series `o1/o3`\n*Category: model \u00b7 Tags: `reasoning` `OpenAI` `CoT`*\n\nOpenAI's reasoning model family (o1, o1-mini, o3, o4-mini) that uses test-time compute scaling \u2014 extended chain-of-thought reasoning \u2014 to achieve exceptional performance on math, science, and coding benchmarks. [[16]](#bibliography)\n\n---\n\n### OpenClaw\n*Category: tool \u00b7 Tags: `agentic` `framework` `open-source` `Moltbook` `2026`*\n\nAn open-source autonomous AI agent framework, formerly known as Clawbot and Moltbot. Designed for building agents capable of persistent social interactions, content creation, and community formation \u2014 most notably as the primary framework powering Moltbook. Supports multi-agent coordination and long-horizon agentic tasks. [[31]](#bibliography)\n\n---\n\n### Orchestration\n*Category: concept \u00b7 Tags: `agentic` `multi-agent` `workflow`*\n\nIn agentic AI systems, the management of multiple AI agents, tools, and workflows \u2014 deciding which agents to invoke, in what order, and how to handle results. Frameworks: LangGraph, CrewAI, AutoGen, Claude's multi-agent APIs.\n\n---\n\n## P\n\n### PPO `Proximal Policy Optimization`\n*Category: training \u00b7 Tags: `RL` `RLHF`*\n\nA reinforcement learning algorithm used in RLHF to fine-tune language models based on reward signals. Balances update size to prevent reward hacking. Key in ChatGPT and Claude's training pipelines. [[32]](#bibliography)\n\n---\n\n### PEFT `Parameter-Efficient Fine-Tuning`\n*Category: training \u00b7 Tags: `fine-tuning` `LoRA` `efficiency`*\n\nAn umbrella term for techniques that fine-tune a small fraction of model parameters rather than the full network \u2014 dramatically reducing compute and memory requirements. Covers LoRA, QLoRA, prefix tuning, and adapter methods. Enables large-model fine-tuning on consumer-grade hardware. [[33]](#bibliography)\n\n---\n\n### Pre-training\n*Category: training \u00b7 Tags: `LLM` `compute`*\n\nThe first, large-scale phase of LLM training on massive text corpora using self-supervised objectives (next-token prediction or masked language modeling). Requires enormous compute; builds world knowledge and language understanding.\n\n---\n\n### Prompt Engineering `PE`\n*Category: concept \u00b7 Tags: `prompting` `few-shot` `CoT`*\n\nThe practice of crafting inputs (prompts) to elicit desired model behaviors without modifying weights. Includes system prompts, few-shot examples, CoT, structured XML, and role prompts. A distinct skill set for maximizing LLM performance.\n\n---\n\n### Prompt Injection\n*Category: safety \u00b7 Tags: `security` `adversarial` `agentic`*\n\nAn attack where malicious instructions embedded in external content (web pages, documents, emails) hijack an LLM's behaviour \u2014
