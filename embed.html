onts default. All fonts free under libre licences.\n\n[collletttivo.it](https://collletttivo.it)\n\n---\n\n### Tool \u00b7 Use & Modify\n*Category: Typography \u00b7 Price: Free \u00b7 Tags: `typography` `open-source`*\n\nCurated catalogue of libre fonts compiled by Rapha\u00ebl Bastide \u2014 organised by formal quality rather than popularity. Strong critical framing around what makes a typeface worth using. Smaller than other repositories but higher signal-to-noise; a useful counterpoint to algorithmic recommendations. All fonts are libre-licensed.\n\n[useandmodify.com](https://useandmodify.com)\n\n---\n\n### Tool \u00b7 Future Fonts\n*Category: Typography \u00b7 Price: Paid \u00b7 Tags: `typography` `variable`*\n\nPlatform for purchasing typefaces that are still in active development \u2014 released early at lower prices, rising as the family is completed. Strong discovery tool for emerging type designers and contemporary releases not yet on mainstream foundry sites. Pay-what-you-want pricing on some faces; not free but often very affordable at early-access stage.\n\n[futurefonts.co](https://www.futurefonts.co)\n\n---\n\n### Tool \u00b7 Utopia\n*Category: Layout \u00b7 Price: Free \u00b7 Tags: `typography` `layout` `variable`*\n\nGenerates fluid type and space scales that interpolate between minimum and maximum viewport sizes using CSS clamp(). Removes arbitrary breakpoint-based sizing \u2014 the result is a coherent, proportional typographic system across all screen sizes. Accompanied by thorough documentation.\n\n[utopia.fyi](https://utopia.fyi)\n\n---\n\n### Tool \u00b7 Coolors\n*Category: Colour \u00b7 Price: Freemium \u00b7 Tags: `colour` `identity` `branding`*\n\nThe most widely-used palette generator. Generate, lock, and adjust colour combinations at speed; explore trending palettes; extract from images; check contrast. Free tier covers most needs. Useful at the start of a brand or identity project for rapid colour exploration.\n\n[coolors.co](https://coolors.co)\n\n---\n\n### Tool \u00b7 Huemint\n*Category: Colour \u00b7 Price: Free \u00b7 Tags: `colour` `identity` `ai`*\n\nAI-powered colour scheme generator that applies palettes to brand, layout, and illustration contexts rather than just showing abstract swatches. Lets you see how a combination performs on a poster, web page, or logo before committing. More contextually useful than most palette tools.\n\n[huemint.com](https://huemint.com)\n\n---\n\n### Tool \u00b7 Pigment by ShapeFactory\n*Category: Colour \u00b7 Price: Free \u00b7 Tags: `colour` `identity`*\n\nPerceptually accurate colour mixer \u2014 mixes colours as physical pigments rather than RGB values, producing results that feel natural rather than digitally muddy. Simpler and more constrained than Coolors; useful when building a palette from a single anchor colour.\n\n[pigment.shapefactory.co](https://pigment.shapefactory.co)\n\n---\n\n### Tool \u00b7 Palettte\n*Category: Colour \u00b7 Price: Free \u00b7 Tags: `colour` `identity`*\n\nDesigned for building and editing smooth, perceptually consistent colour gradients and design system palettes. Lets you visualise how colours transition across a scale, identify irregularities, and correct them. More precision-focused than Coolors; better suited to systematic colour work.\n\n[palettte.app](https://palettte.app)\n\n---\n\n### Tool \u00b7 Who Can Use\n*Category: Colour \u00b7 Price: Free \u00b7 Tags: `colour` `accessibility`*\n\nEnter a foreground and background colour and see WCAG contrast ratios across a range of simulated visual conditions \u2014 normal vision, colour blindness variants, low vision. Shows real example text rather than abstract pass/fail scores. The most intuitive accessibility colour tool available.\n\n[whocanuse.com](https://whocanuse.com)\n\n---\n\n### Tool \u00b7 Figma\n*Category: Collaboration \u00b7 Price: Freemium \u00b7 Tags: `layout` `prototyping` `vector` `collaboration`*\n\nBrowser-based design and prototyping tool, dominant across UI, branding, and editorial work. Strong variable font support, component systems, and a large plugin ecosystem. Free tier covers most solo practice; paid plans add version history and advanced sharing. Desktop apps available.\n\n[figma.com](https://www.figma.com)\n\n---\n\n### Tool \u00b7 Miro\n*Category: Collaboration \u00b7 Price: Freemium \u00b7 Tags: `collaboration` `layout`*\n\nCollaborative visual whiteboard used widely in design education, workshops, and studio practice. Useful for mapping, mood-boarding, presenting process work, and running remote critiques. Free tier allows three editable boards; integrates with Figma, Notion, and most project management tools.\n\n[miro.com](https://miro.com)\n\n---\n\n### Tool \u00b7 Are.na\n*Category: Collaboration \u00b7 Price: Freemium \u00b7 Tags: `inspiration` `collaboration` `education`*\n\nVisual research and mood-boarding platform with a slower, more considered culture than Pinterest or Behance. Widely used in design education and independent practice for building research channels, collecting references, and thinking in public. Free for limited channels; modest paid tier.\n\n[are.na](https://www.are.na)\n\n---\n\n### Tool \u00b7 Fonts In Use\n*Category: Inspiration \u00b7 Price: Free \u00b7 Tags: `typography` `inspiration` `history`*\n\nArchive of typography in real-world use \u2014 print, packaging, signage, editorial, environmental. Search by typeface, industry, format, or designer. Invaluable for understanding how a face performs in context before specifying it, and for type identification research.\n\n[fontsinuse.com](https://fontsinuse.com)\n\n---\n\n### Tool \u00b7 Typewolf\n*Category: Inspiration \u00b7 Price: Free \u00b7 Tags: `typography` `inspiration` `font-pairing`*\n\nCurated showcase of type-in-use on live websites, with type identification and pairing notes. Updated regularly; strong editorial bias. Useful for tracking how contemporary designers are using typefaces commercially, and for discovering new releases in context.\n\n[typewolf.com](https://www.typewolf.com)\n\n---\n\n### Tool \u00b7 Archives.design\n*Category: Inspiration \u00b7 Price: Free \u00b7 Tags: `history` `inspiration` `editorial`*\n\nSearchable archive of graphic design history \u2014 posters, books, magazines, identity systems, and ephemera. Strong emphasis on 20th century Swiss, German, and American modernism. Images are high resolution and downloadable. A useful complement to physical archive research.\n\n[archives.design](https://archives.design)\n\n---\n\n### Tool \u00b7 LottieFiles\n*Category: Motion \u00b7 Price: Freemium \u00b7 Tags: `motion` `open-source` `web`*\n\nPlatform for Lottie \u2014 a JSON-based animation format that renders After Effects animations at small file sizes in browser and mobile contexts. Large library of free animations; editor for customising colours and speed without After Effects. Increasingly standard for UI motion and icon animation.\n\n[lottiefiles.com](https://lottiefiles.com)\n\n---\n\n### Tool \u00b7 Rive\n*Category: Motion \u00b7 Price: Freemium \u00b7 Tags: `motion` `interactive` `web`*\n\nDesign and ship interactive, state-driven animations for web and app. Goes beyond Lottie by supporting interactivity \u2014 animations that respond to user input. Browser-based editor with a real-time runtime. Increasingly used for micro-interactions, onboarding flows, and game UI.\n\n[rive.app](https://rive.app)\n\n---\n\n### Tool \u00b7 Adobe Firefly\n*Category: AI \u00b7 Price: Freemium \u00b7 Tags: `ai` `image` `vector`*\n\nAdobe's generative AI suite \u2014 text-to-image, Generative Fill, vector recolouring, and text effects. Trained exclusively on licensed and public domain content, making outputs commercially safe \u2014 a meaningful distinction from other generative tools. Integrated into Photoshop, Illustrator, and Express.\n\n[firefly.adobe.com](https://firefly.adobe.com)\n\n---\n\n### Tool \u00b7 Khroma\n*Category: AI \u00b7 Price: Free \u00b7 Tags: `colour` `ai` `identity`*\n\nTrain your own colour palette AI by selecting 50 colours you like, then generate unlimited combinations as typography, gradients, images, and custom palettes. Results reflect your own taste rather than a generic algorithm. One of the few AI design tools that genuinely personalises to the user.\n\n[khroma.co](http://khroma.co)\n\n---\n\n### Tool \u00b7 Squoosh\n*Category: Production \u00b7 Price: Free \u00b7 Tags: `image` `open-source` `web`*\n\nGoogle's browser-based image compression tool. Compresses and converts between formats (JPEG, WebP, AVIF, PNG) with live side-by-side quality comparison. Precise control over compression settings without needing Photoshop. Useful for optimising images for web without leaving the browser.\n\n[squoosh.app](https://squoosh.app)\n\n---\n\n### Tool \u00b7 Iconify\n*Category: Production \u00b7 Price: Free \u00b7 Tags: `icons` `open-source` `web` `svg`*\n\nUnified access to over 200,000 open-source icons from 150+ icon sets \u2014 Material, Feather, Phosphor, Tabler, and many more \u2014 in a single browser-based search. Export as SVG or integrate directly into Figma via plugin. Eliminates the need to maintain separate icon library subscriptions.\n\n[iconify.design](https://iconify.design)\n\n---\n\n### Tool \u00b7 Photopea\n*Category: Image \u00b7 Price: Free \u00b7 Tags: `image` `vector` `print`*\n\nFull Photoshop-equivalent editor in the browser \u2014 opens and exports PSD, AI, XCF, Sketch, and all standard image formats. Supports layers, masks, adjustment layers, smart objects, and non-destructive editing. No account required. A genuine alternative to Photoshop for asset preparation, mockup editing, and print file work.\n\n[photopea.com](https://www.photopea.com)\n\n---\n\n### Tool \u00b7 Remove.bg\n*Category: Image \u00b7 Price: Freemium \u00b7 Tags: `image` `ai`*\n\nAI-powered background removal in seconds. Upload any image, get a clean cutout with transparent background. Free tier allows unlimited use at lower resolution; paid for full resolution. Saves considerable time on asset preparation; handles hair and complex edges better than manual masking for most standard shots.\n\n[remove.bg](https://www.remove.bg)\n\n---\n\n### Tool \u00b7 Cleanup.pictures\n*Category: Image \u00b7 Price: Freemium \u00b7 Tags: `image` `ai`*\n\nAI object and element removal from photographs. Brush over anything \u2014 wires, watermarks, people, unwanted objects \u2014 and the tool in-paints the background convincingly. Useful for cleaning up reference imagery, location photography, and press shots for presentations. Free tier for basic use.\n\n[cleanup.pictures](https://cleanup.pictures)\n\n---\n\n### Tool \u00b7 TAAG \u2014 Text to ASCII Art Generator\n*Category: Experimental \u00b7 Price: Free \u00b7 Tags: `typography` `experimental` `open-source`*\n\nThe definitive text-to-ASCII art tool \u2014 over 700 font styles from monolithic slabs to tiny figlet faces, rendered in plain text. Useful for terminal interfaces, README headers, type exploration, and generative/experimental typography. Output is plain text; copy and use anywhere.\n\n[patorjk.com/software/taag](https://patorjk.com/software/taag/)\n\n---\n\n### Tool \u00b7 ASCII Art Generator\n*Category: Experimental \u00b7 Price: Free \u00b7 Tags: `image` `experimental` `typography`*\n\nConverts any uploaded image or typed text to ASCII art. Adjustable character density, colour output, and inversion. Useful for experimental typography, low-res image treatment, and translation between photographic and typographic registers \u2014 a consistent reference in print and digital design.\n\n[ascii-art-generator.org](https://www.ascii-art-generator.org)\n\n---\n\n### Tool \u00b7 HalftonePro\n*Category: Experimental \u00b7 Price: Freemium \u00b7 Tags: `print` `experimental` `image`*\n\nBrowser-based halftone effect generator with genuine CMYK control \u2014 adjust dot shape, angle, frequency, and spacing per channel. Output as SVG or PNG. More precise and design-oriented than Photoshop's built-in halftone filter. Relevant for print preparation, riso printing, and any work that engages the visual language of offset reproduction.\n\n[halftonepro.com](https://halftonepro.com)\n\n---\n\n### Tool \u00b7 Dithermark\n*Category: Experimental \u00b7 Price: Free \u00b7 Tags: `image` `experimental` `print` `open-source`*\n\nDithering tool with a wide range of algorithms \u2014 Floyd-Steinberg, ordered, pattern, random, and more \u2014 applied live in the browser. Relevant to risograph printing (which requires separated, dithered tones), pixel art, lo-fi image treatment, and understanding how images reproduce under constrained conditions. Open-source.\n\n[app.dithermark.com](https://app.dithermark.com)\n\n---\n\n### Tool \u00b7 Photomosh\n*Category: Experimental \u00b7 Price: Freemium \u00b7 Tags: `image` `motion` `experimental`*\n\nBrowser-based glitch and distortion effects for images and video \u2014 datamosh, pixel sort, blur, RGB split, VHS, and more applied in real time. Export as image, GIF, or video. Useful for experimental image treatment, motion graphics, and anything operating in the visual vocabulary of analogue degradation and digital corruption.\n\n[photomosh.com](https://photomosh.com)\n\n---\n\n### Tool \u00b7 Affinity Suite\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `vector` `image` `layout` `print` `open-source`*\n\nSerif's professional design suite \u2014 Affinity Photo, Designer, and Publisher \u2014 covering Photoshop, Illustrator, and InDesign use cases. Made fully free in 2025. Native PSD, AI, PDF, and IDML import/export. No subscription, no cloud lock-in. The most complete Adobe CC alternative available and now the default recommendation for anyone avoiding the subscription model.\n\n[affinity.serif.com](https://affinity.serif.com)\n\n---\n\n### Tool \u00b7 Inkscape\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `vector` `svg` `open-source` `print`*\n\nOpen-source vector graphics editor, SVG-native with PDF and EPS export. Actively developed; covers most Illustrator use cases including B\u00e9zier editing, typography on a path, live path effects, and pattern fills. Less polished than Affinity Designer but more powerful in some areas. Long-standing standard in open-source print and web design.\n\n[inkscape.org](https://inkscape.org)\n\n---\n\n### Tool \u00b7 GIMP\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `image` `open-source` `print`*\n\nOpen-source raster image editor \u2014 the longest-standing Photoshop alternative. Handles layers, masks, curves, channel editing, and batch processing. PSD import/export supported. Steeper learning curve than Photoshop but fully capable for print asset preparation, photo retouching, and web graphics. Scripting support via Script-Fu and Python-Fu.\n\n[gimp.org](https://www.gimp.org)\n\n---\n\n### Tool \u00b7 Krita\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `illustration` `image` `open-source`*\n\nOpen-source painting and illustration application with an exceptionally strong brush engine \u2014 widely preferred over GIMP for illustration and concept work. Supports PSD import, HDR painting, animation, and vector layers. Developed by the KDE community with consistent funding from users. The standard recommendation for digital illustration outside the Adobe ecosystem.\n\n[krita.org](https://krita.org)\n\n---\n\n### Tool \u00b7 Scribus\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `layout` `print` `open-source`*\n\nOpen-source desktop publishing application \u2014 the primary InDesign alternative. Handles multi-page layouts, master pages, styles, colour management, PDF/X export, and pre-press output. Less refined than InDesign but fully capable for print production. Widely used in community publishing, zine production, and organisations avoiding subscription software.\n\n[scribus.net](https://www.scribus.net)\n\n---\n\n### Tool \u00b7 darktable\n*Category: Open Source \u00b7 Price: Free \u00b7 Tags: `image` `photography` `open-source`*\n\nOpen-source RAW photo processor and non-destructive editor \u2014 the most complete Lightroom alternative available. Handles RAW development, colour grading, lens correction, and export for all major camera manufacturers. Steep initial learning curve; powerful for anyone doing serious photographic work alongside design practice.\n\n[darktable.org](https://www.darktable.org)\n\n---\n\n### Tool \u00b7 Glyphs Mini\n*Category: Font Design \u00b7 Price: Paid (\u00a344.99) \u00b7 Tags: `typography` `font-design` `variable`*\n\nEntry-level font editor from the makers of Glyphs \u2014 the industry-standard type design application on Mac. Covers glyph drawing, spacing, kerning, and OpenType feature basics. Exports OTF and TTF. A genuine starting point for type design practice; upgrade path to the full Glyphs app when complexity demands it.\n\n[glyphsapp.com](https://glyphsapp.com)\n\n---\n\n### Tool \u00b7 FontForge\n*Category: Font Design \u00b7 Price: Free \u00b7 Tags: `typography` `font-design` `open-source`*\n\nOpen-source font editor \u2014 the primary free alternative to Glyphs and FontLab. Handles glyph drawing, spacing, kerning, OpenType features, and font format conversion (OTF, TTF, WOFF, SVG fonts). Dated interface but fully capable; widely used in academic and open-source type projects. Runs on Mac, Windows, and Linux.\n\n[fontforge.org](https://fontforge.org)\n\n---\n\n### Tool \u00b7 Metaflop Modulator\n*Category: Font Design \u00b7 Price: Free \u00b7 Tags: `typography` `font-design` `experimental` `open-source`*\n\nParametric type design tool based on Metafont \u2014 adjust a set of sliders (stroke width, serif size, x-height, spacing) to generate a complete typeface from a mathematical model. Produces usable fonts and is a strong conceptual tool for understanding how typeface parameters interact. Outputs OTF directly in browser.\n\n[metaflop.com/modulator](https://www.metaflop.com/modulator)\n\n---\n\n### Tool \u00b7 Prototypo\n*Category: Font Design \u00b7 Price: Freemium \u00b7 Tags: `typography` `font-design` `variable`*\n\nBrowser-based parametric font editor. Adjust letterform parameters \u2014 contrast, width, x-height, ascenders, curvature \u2014 across a full character set simultaneously. Exports OTF. Useful for rapid type exploration and for designers wanting to understand type construction without committing to a full type design workflow.\n\n[prototypo.io](https://www.prototypo.io)\n\n---\n\n### Tool \u00b7 TouchDesigner\n*Category: Creative Coding \u00b7 Price: Freemium \u00b7 Tags: `motion` `interactive` `generative` `experimental`*\n\nVisual programming environment for real-time interactive media \u2014 live visuals, installations, projection mapping, data-driven graphics, and generative systems. Node-based workflow; no traditional coding required for most applications. Free non-commercial licence covers educational and personal use fully. Industry standard for live performance and installation work.\n\n[derivative.ca](https://derivative.ca)\n\n---\n\n### Tool \u00b7 Blender\n*Category: Creative Coding \u00b7 Price: Free \u00b7 Tags: `motion` `generative` `open-source` `image`*\n\nOpen-source 3D creation suite covering modelling, rigging, animation, rendering, compositing, and motion graphics. Free, no subscription. Used extensively for 3D type, abstract motion design, product visualisation, and CGI for print and broadcast. Large community and tutorial ecosystem; Geometry Nodes system enables parametric and generative 3D work.\n\n[blender.org](https://www.blender.org)\n\n---\n\n### Tool \u00b7 p5.js\n*Category: Creative Coding \u00b7 Price: Free \u00b7 Tags: `generative` `interactive` `open-source` `web`*\n\nJavaScript library for creative coding in the browser \u2014 the web port of Processing. Draw, animate, and interact with code in a browser-based editor. Widely taught in design education as an entry point to generative graphics, data visualisation, and computational form. Extensive documentation and an active community of designers and artists.\n\n[p5js.org](https://p5js.org)\n\n---\n\n### Tool \u00b7 Cables.gl\n*Category: Creative Coding \u00b7 Price: Freemium \u00b7 Tags: `generative` `interactive` `motion` `web`*\n\nBrowser-based visual programming environment for real-time WebGL \u2014 similar conceptual territory to TouchDesigner but runs entirely in the browser. Node-based; no install required. Strong for generative graphics, interactive web experiences, and shader-based visual work. Outputs can be embedded directly in websites. Free for public projects.\n\n[cables.gl](https://cables.gl)\n\n---\n\n### Tool \u00b7 Cavalry\n*Category: Creative Coding \u00b7 Price: Freemium \u00b7 Tags: `motion` `generative` `vector`*\n\n2D motion graphics application designed as a data-driven alternative to After Effects. Procedural, non-destructive workflow \u2014 link any parameter to data, expressions, or other parameters. Faster and more logical for design-led motion work than AE; particularly strong for kinetic typography, animated brand systems, and infographic animation. Free tier for non-commercial use.\n\n[cavalry.scenegroup.co](https://cavalry.scenegroup.co)\n\n---\n\n## Sources\n\nDesign news and critical writing used to populate this calendar.\n\n**Design news & features**\n[It's Nice That](https://www.itsnicethat.com) \u00b7 [Creative Boom](https://www.creativeboom.com) \u00b7 [Eye Magazine](https://eyemagazine.com) \u00b7 [Dezeen Design](https://www.dezeen.com/design) \u00b7 [Slanted](https://www.slanted.de) \u00b7 [Design Week](https://www.designweek.co.uk) \u00b7 [Wallpaper*](https://www.wallpaper.com)\n\n**Typography**\n[TypeCache](https://typecache.com/news) \u00b7 [Fonts In Use](https://fontsinuse.com) \u00b7 [Google Fonts](https://fonts.google.com/knowledge) \u00b7 [Adobe Fonts](https://fonts.adobe.com) \u00b7 [Typotheque](https://www.typotheque.com/blog) \u00b7 [Underware](https://www.underware.nl) \u00b7 [Are.na](https://www.are.na)\n\n**Books & publishing**\n[Counter-Print](https://www.counter-print.co.uk)\n\n**Events & talks**\n[Typographic Circle](https://www.typocircle.com) \u00b7 [St Bride Foundation](https://sbf.org.uk/whats-on) \u00b7 [Letterform Archive](https://letterformarchive.org/events) \u00b7 [Type@Cooper](https://cooper.edu/art/type-cooper) \u00b7 [Type Directors Club](https://tdc.org) \u00b7 [ISTD](https://www.istd.org.uk)\n\n**London exhibitions**\n[Design Museum](https://designmuseum.org/exhibitions) \u00b7 [V&A](https://www.vam.ac.uk/whats-on) \u00b7 [The Photographers' Gallery](https://thephotographersgallery.org.uk) \u00b7 [Serpentine Galleries](https://www.serpentinegalleries.org) \u00b7 [South London Gallery](https://www.southlondongallery.org) \u00b7 [Barbican](https://www.barbican.org.uk/whats-on)\n\n**Sheffield**\n[Site Gallery](https://www.sitegallery.org) \u00b7 [Sheffield Museums](https://www.sheffieldmuseums.org.uk/whats-on) \u00b7 [S1 Artspace](https://s1artspace.org) \u00b7 [Bloc Projects](https://blocprojects.org.uk) \u00b7 [SHU Gallery](https://gallery.shu.ac.uk) \u00b7 [Yorkshire Artspace](https://yorkshireartspace.org)\n\n**North**\n[Creative Tourist](https://www.creativetourist.com/exhibitions) \u00b7 [People's History Museum](https://phm.org.uk/whats-on) \u00b7 [FACT Liverpool](https://www.fact.co.uk/whats-on) \u00b7 [Leeds Art Gallery](https://museumsandgalleries.leeds.gov.uk/whats-on) \u00b7 [Photo North](https://www.photonorth.co.uk) \u00b7 [Design Festival North](https://www.designsocialnorth.co.uk)\n\n**Podcasts**\n[Scratching the Surface](https://scratchingthesurface.fm) \u2014 critical writing, theory, and history (Jarrett Fuller) \u00b7 [Design Matters](https://www.designmattersmedia.com) \u2014 long-running interview series (Debbie Millman) \u00b7 [Working File](https://www.workingfile.co.uk) \u2014 UK studio practice and process \u00b7 [Nice to Meet You](https://www.itsnicethat.com/tags/nice-to-meet-you) \u2014 It's Nice That's practitioner interviews\n\n**Video**\n[Letterform Archive](https://www.youtube.com/@LetterformArchive) \u2014 free type and lettering lectures \u00b7 [Type@Cooper](https://www.youtube.com/@TypeCooper) \u2014 free NYC typography lecture archive \u00b7 [The Futur](https://www.youtube.com/@TheFutur) \u2014 design practice and creative business (Chris Do) \u00b7 [ATypI](https://www.youtube.com/@ATypI) \u2014 international typography conference recordings\n";
