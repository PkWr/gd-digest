 causing it to ignore its system prompt and execute unintended actions. A critical security concern for agentic AI systems with tool access. Mitigated by sandboxing, input sanitisation, and privilege separation. [[34]](#bibliography)\n\n---\n\n### PyTorch\n*Category: tool \u00b7 Tags: `framework` `Meta` `research`*\n\nMeta's open-source deep learning framework. The dominant platform for AI research and production model training. Features dynamic computation graphs, extensive CUDA support, and the ecosystem most major LLMs are built on. [[35]](#bibliography)\n\n---\n\n## Q\n\n### QLoRA `Quantized Low-Rank Adaptation`\n*Category: training \u00b7 Tags: `LoRA` `fine-tuning` `quantization` `efficiency`*\n\nCombines 4-bit quantization with LoRA adapters to enable fine-tuning of 65B+ parameter models on a single consumer GPU. Democratized LLM fine-tuning significantly. [[36]](#bibliography)\n\n---\n\n### Quantization\n*Category: concept \u00b7 Tags: `efficiency` `inference` `compression`*\n\nReducing the numerical precision of model weights (e.g., from float32 to int8 or int4) to decrease memory footprint and accelerate inference. Methods include GPTQ, AWQ, and GGUF (used by llama.cpp for local inference). [[37]](#bibliography)\n\n---\n\n## R\n\n### RAG `Retrieval-Augmented Generation`\n*Category: concept \u00b7 Tags: `retrieval` `vector DB` `grounding`*\n\nA technique that enhances LLM responses by retrieving relevant documents from a knowledge base and inserting them into the context. Reduces hallucinations and enables up-to-date knowledge without retraining. [[38]](#bibliography)\n\n---\n\n### Reasoning Model\n*Category: model \u00b7 Tags: `CoT` `inference` `benchmark`*\n\nLLMs optimized for multi-step problem solving via test-time compute scaling \u2014 extended CoT reasoning before answering. Examples: OpenAI o1/o3, Claude 3.7 Sonnet (extended thinking), DeepSeek-R1, Gemini 2.0 Flash Thinking. [[10]](#bibliography) [[16]](#bibliography)\n\n---\n\n### Red-teaming\n*Category: safety \u00b7 Tags: `evaluation` `adversarial`*\n\nAdversarial testing where humans or automated systems attempt to elicit unsafe, biased, or harmful model outputs. Essential for safety evaluation before deployment. Conducted internally at Anthropic, OpenAI, and by third-party evaluators. [[39]](#bibliography)\n\n---\n\n### Reinforcement Learning `RL`\n*Category: training \u00b7 Tags: `RL` `RLHF` `alignment`*\n\nA machine learning paradigm where an agent learns by taking actions in an environment and receiving reward signals \u2014 reinforcing behaviours that maximise cumulative reward. The foundation of RLHF and reasoning model training. Key algorithms include PPO and GRPO. Contrasts with supervised learning, which trains on fixed labelled datasets. [[32]](#bibliography)\n\n---\n\n### Responsible Scaling Policy `RSP`\n*Category: safety \u00b7 Tags: `Anthropic` `policy`*\n\nAnthropic's framework for evaluating AI model capabilities against safety thresholds (ASL-1 through ASL-4) before deployment. Triggers additional safety measures or deployment holds if risk thresholds are exceeded. [[8]](#bibliography)\n\n---\n\n### RLHF `Reinforcement Learning from Human Feedback`\n*Category: training \u00b7 Tags: `alignment` `human feedback`*\n\nA training method where human raters compare model outputs, and a reward model trained on these preferences is used to fine-tune the LLM via RL (typically PPO). Powers ChatGPT, Claude, Gemini. [[40]](#bibliography)\n\n---\n\n## S\n\n### Scaling Laws\n*Category: concept \u00b7 Tags: `scaling` `training` `research`*\n\nEmpirical relationships describing how model performance improves predictably with increases in compute, data, and parameters. The Chinchilla paper (2022) established optimal compute-to-parameter ratios. Scaling laws guide frontier lab decisions on training run sizes and justify continued investment in larger models and datasets. [[41]](#bibliography) [[42]](#bibliography)\n\n---\n\n### Sparse Autoencoder `SAE`\n*Category: safety \u00b7 Tags: `interpretability` `Anthropic` `research`*\n\nA neural network tool used in mechanistic interpretability research to decompose model activations into sparse, human-interpretable features. Anthropic's 2024 work using SAEs identified millions of features in Claude, including emotions and concepts. [[43]](#bibliography)\n\n---\n\n### Speculative Decoding\n*Category: concept \u00b7 Tags: `inference` `efficiency` `latency`*\n\nAn inference acceleration technique where a smaller 'draft' model proposes multiple tokens that are verified in parallel by the larger 'target' model. Can achieve 2\u20134x speedup with identical outputs. Used in production serving systems. [[44]](#bibliography)\n\n---\n\n### Supervised Fine-Tuning `SFT`\n*Category: training \u00b7 Tags: `fine-tuning` `RLHF`*\n\nFine-tuning a model on labeled input-output examples. The first stage of RLHF pipelines: pre-trained model \u2192 SFT on human demonstrations \u2192 reward model \u2192 RL fine-tuning. Establishes basic instruction-following capability. [[40]](#bibliography)\n\n---\n\n### SWE-bench\n*Category: concept \u00b7 Tags: `benchmark` `code` `agentic`*\n\nA benchmark of real GitHub issues requiring code changes to resolve. Tests models' ability to locate bugs, write fixes, and pass test suites across real codebases. Claude 3.7 Sonnet and OpenAI o3 have achieved >50% on verified subsets. [[45]](#bibliography)\n\n---\n\n### System Prompt\n*Category: concept \u00b7 Tags: `prompting` `deployment` `API`*\n\nInstructions provided to an LLM at the start of a conversation (often hidden from the user) that configure its persona, behavior, capabilities, and constraints. Key tool for deploying customized AI products.\n\n---\n\n## T\n\n### Temperature\n*Category: concept \u00b7 Tags: `sampling` `generation` `hyperparameter`*\n\nA sampling parameter (0.0\u20132.0) controlling randomness in token selection. Low temperature (near 0) makes outputs deterministic and focused; high temperature increases diversity and creativity. Often paired with top-p sampling.\n\n---\n\n### Test-Time Compute `TTC`\n*Category: concept \u00b7 Tags: `reasoning` `inference` `scaling`*\n\nScaling computation during inference (not training) to improve model outputs \u2014 e.g., running longer reasoning chains, beam search, or best-of-N sampling. OpenAI o1 and DeepSeek-R1 demonstrated this as an alternative scaling axis. [[10]](#bibliography) [[16]](#bibliography)\n\n---\n\n### Token\n*Category: concept \u00b7 Tags: `tokenization` `LLM` `foundational`*\n\nThe basic unit of text that LLMs process \u2014 typically a word fragment, whole word, or punctuation mark, produced by tokenization algorithms like BPE. Context windows, API pricing, and throughput are all measured in tokens. A typical English word is roughly 1.3 tokens; code and non-Latin scripts tend to be more token-dense.\n\n---\n\n### Tokenization\n*Category: concept \u00b7 Tags: `NLP` `preprocessing` `BPE`*\n\nConverting raw text into tokens (sub-word units) that the model processes. BPE and SentencePiece are common algorithms. Tokenization affects model efficiency, language coverage, and how models handle math, code, and non-Latin scripts. [[6]](#bibliography)\n\n---\n\n### Tool Use / Function Calling\n*Category: concept \u00b7 Tags: `agentic` `API` `tools`*\n\nThe ability of an LLM to invoke external tools (APIs, databases, code interpreters) by generating structured calls that are executed by the surrounding system. Core to agentic AI; supported natively by Claude, GPT-4, and Gemini APIs. [[46]](#bibliography)\n\n---\n\n### Transformer\n*Category: model \u00b7 Tags: `architecture` `attention` `foundational`*\n\nThe dominant neural network architecture for LLMs, introduced in 'Attention Is All You Need' (2017). Based on self-attention mechanisms rather than recurrence. Foundation of virtually all modern LLMs, vision models, and multimodal systems. [[3]](#bibliography)\n\n---\n\n### TPU `Tensor Processing Unit`\n*Category: tool \u00b7 Tags: `hardware` `Google` `training`*\n\nGoogle's custom AI accelerator chip, designed specifically for the matrix operations at the heart of neural network training and inference. TPUs power Google DeepMind's Gemini training runs. Competing AI chips include NVIDIA GPUs, Groq LPUs, AWS Trainium, and Intel Gaudi. [[47]](#bibliography)\n\n---\n\n## U\n\n### Uplift\n*Category: safety \u00b7 Tags: `dual-use` `CBRN` `policy`*\n\nThe degree to which an AI model provides meaningful assistance to a bad actor beyond what they could achieve without it. A key metric in dual-use evaluations: a model that merely confirms publicly available information provides low uplift; one that fills critical knowledge gaps or accelerates dangerous capability development provides high uplift. Central to CBRN risk thresholds in frontier lab safety frameworks.\n\n---\n\n### Uncertainty Quantification `UQ`\n*Category: concept \u00b7 Tags: `safety` `reliability` `calibration`*\n\nMethods for estimating how confident a model is in its predictions. Important for safe AI deployment; techniques include Bayesian inference, conformal prediction, and calibration. Reduces risk from overconfident wrong answers.\n\n---\n\n## V\n\n### Vector Database `Vector DB`\n*Category: tool \u00b7 Tags: `RAG` `embeddings` `infrastructure`*\n\nA database optimized for storing and querying high-dimensional embedding vectors. Enables semantic similarity search at scale. Key infrastructure for RAG systems. Major providers: Pinecone, Weaviate, Qdrant, pgvector, Chroma.\n\n---\n\n### Vibe Coding\n*Category: concept \u00b7 Tags: `code` `developer tools` `agentic`*\n\nA term (popularized by Andrej Karpathy, 2025) for AI-assisted coding where developers describe intent in natural language and AI generates the code \u2014 shifting programmer focus from syntax to intent, review, and architecture.\n\n---\n\n### Vision Language Model `VLM`\n*Category: model \u00b7 Tags: `multimodal` `vision` `LLM`*\n\nMultimodal models that can process both images and text. Examples include GPT-4o, Claude 3 (all tiers), Gemini, LLaVA, and Qwen-VL. Enables document understanding, chart analysis, visual QA, and screenshot-to-code. [[48]](#bibliography)\n\n---\n\n## W\n\n### World Model\n*Category: concept \u00b7 Tags: `RL` `reasoning` `planning`*\n\nAn internal representation of how the world works, used for planning and prediction. LLMs arguably learn implicit world models from text. Explicit world models (like in Dreamer or Wayve's driving AI) support model-based RL.\n\n---\n\n## X\n\n### XML Prompting\n*Category: concept \u00b7 Tags: `prompting` `Anthropic` `structure`*\n\nUsing XML-style tags in prompts to structure complex instructions, separate content sections, and organize multi-step agent reasoning. Claude's training specifically optimizes for XML-structured prompts, improving reliability in production pipelines.\n\n---\n\n## Y\n\n### YOLO `You Only Look Once`\n*Category: model \u00b7 Tags: `computer vision` `object detection` `real-time`*\n\nA real-time object detection architecture that processes entire images in a single forward pass. YOLOv8/v11 remain widely used in computer vision pipelines. Important in multimodal AI systems. [[49]](#bibliography)\n\n---\n\n## Z\n\n### ZeRO `Zero Redundancy Optimizer`\n*Category: training \u00b7 Tags: `distributed training` `efficiency` `DeepSpeed`*\n\nMicrosoft DeepSpeed's memory optimization technique for distributed training that partitions optimizer states, gradients, and parameters across GPUs, enabling training of trillion-parameter models. [[50]](#bibliography)\n\n---\n\n### Zero-Shot Learning\n*Category: concept \u00b7 Tags: `prompting` `generalization` `LLM`*\n\nA model's ability to perform a task without any examples in the prompt \u2014 relying entirely on instruction following and prior knowledge. Large models excel at zero-shot generalization, a key advantage over task-specific supervised models. [[4]](#bibliography)\n\n---\n\n*100 terms across concept \u00b7 model \u00b7 training \u00b7 safety \u00b7 tool categories*\n\n---\n\n## Bibliography\n\n1. [ReAct: Synergizing Reasoning and Acting in Language Models](https://arxiv.org/abs/2210.03629) \u2014 Yao et al., 2023\n2. [Concrete Problems in AI Safety](https://arxiv.org/abs/1606.06565) \u2014 Amodei et al., 2016\n3. [Attention Is All You Need](https://arxiv.org/abs/1706.03762) \u2014 Vaswani et al., 2017\n4. [Language Models are Few-Shot Learners (GPT-3)](https://arxiv.org/abs/2005.14165) \u2014 Brown et al., 2020\n5. [BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding](https://arxiv.org/abs/1810.04805) \u2014 Devlin et al., 2018\n6. [Neural Machine Translation of Rare Words with Subword Units (BPE)](https://arxiv.org/abs/1508.07909) \u2014 Sennrich et al., 2016\n7. [Chain-of-Thought Prompting Elicits Reasoning in Large Language Models](https://arxiv.org/abs/2201.11903) \u2014 Wei et al., 2022\n8. [Anthropic's Responsible Scaling Policy](https://www.anthropic.com/news/anthropics-responsible-scaling-policy) \u2014 Anthropic, 2023\n9. [Constitutional AI: Harmlessness from AI Feedback](https://arxiv.org/abs/2212.08073) \u2014 Bai et al., 2022\n10. [DeepSeek-R1: Incentivizing Reasoning Capability in LLMs via Reinforcement Learning](https://arxiv.org/abs/2501.12948) \u2014 DeepSeek AI, 2025\n11. [Denoising Diffusion Probabilistic Models](https://arxiv.org/abs/2006.11239) \u2014 Ho et al., 2020\n12. [Direct Preference Optimization: Your Language Model is Secretly a Reward Model](https://arxiv.org/abs/2305.18290) \u2014 Rafailov et al., 2023\n13. [Distilling the Knowledge in a Neural Network](https://arxiv.org/abs/1503.02531) \u2014 Hinton et al., 2015\n14. [Efficient Estimation of Word Representations in Vector Space (Word2Vec)](https://arxiv.org/abs/1301.3781) \u2014 Mikolov et al., 2013\n15. [Emergent Abilities of Large Language Models](https://arxiv.org/abs/2206.07682) \u2014 Wei et al., 2022\n16. [OpenAI o1 System Card](https://openai.com/index/openai-o1-system-card/) \u2014 OpenAI, 2024\n17. [FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness](https://arxiv.org/abs/2205.14135) \u2014 Dao et al., 2022\n18. [On the Opportunities and Risks of Foundation Models](https://arxiv.org/abs/2108.07258) \u2014 Bommasani et al., 2021\n19. [Gemini: A Family of Highly Capable Multimodal Models](https://arxiv.org/abs/2312.11805) \u2014 Team Gemini, 2023\n20. [Survey of Hallucination in Natural Language Generation](https://arxiv.org/abs/2202.03629) \u2014 Ji et al., 2022\n21. [Evaluating Large Language Models Trained on Code (HumanEval)](https://arxiv.org/abs/2107.03374) \u2014 Chen et al., 2021\n22. [Finetuned Language Models Are Zero-Shot Learners (FLAN)](https://arxiv.org/abs/2109.01652) \u2014 Wei et al., 2021\n23. [A Mathematical Framework for Transformer Circuits](https://transformer-circuits.pub/2021/framework/index.html) \u2014 Elhage et al., 2021\n24. [Judging LLM-as-a-Judge with MT-Bench and Chatbot Arena](https://arxiv.org/abs/2306.05685) \u2014 Zheng et al., 2023\n25. [Llama 2: Open Foundation and Fine-Tuned Chat Models](https://arxiv.org/abs/2307.09288) \u2014 Touvron et al., 2023\n26. [LoRA: Low-Rank Adaptation of Large Language Models](https://arxiv.org/abs/2106.09685) \u2014 Hu et al., 2021\n27. [Mixtral of Experts](https://arxiv.org/abs/2401.04088) \u2014 Jiang et al., 2024\n28. [Measuring Massive Multitask Language Understanding (MMLU)](https://arxiv.org/abs/2009.03300) \u2014 Hendrycks et al., 2020\n29. [Introducing the Model Context Protocol](https://www.anthropic.com/news/model-context-protocol) \u2014 Anthropic, 2024\n30. [Moltbook is the newest social media platform \u2014 but it's just for AI bots](https://www.npr.org/2026/02/04/nx-s1-5697392/moltbook-social-media-ai-agents) \u2014 NPR, 2026\n31. [OpenClaw: The AI Agent Framework Powering Moltbook](https://www.letsdatascience.com/blog/openclaw-the-ai-agent-that-broke-the-internet) \u2014 Let's Data Science, 2026\n32. [Proximal Policy Optimization Algorithms](https://arxiv.org/abs/1707.06347) \u2014 Schulman et al., 2017\n33. [Parameter-Efficient Transfer Learning for NLP](https://arxiv.org/abs/1902.00751) \u2014 Houlsby et al., 2019\n34. [Not what you've signed up for: Compromising Real-World LLM-Integrated Applications with Indirect Prompt Injection](https://arxiv.org/abs/2302.12173) \u2014 Greshake et al., 2023\n35. [PyTorch: An Imperative Style, High-Performance Deep Learning Library](https://arxiv.org/abs/1912.01703) \u2014 Paszke et al., 2019\n36. [QLoRA: Efficient Finetuning of Quantized LLMs](https://arxiv.org/abs/2305.14314) \u2014 Dettmers et al., 2023\n37. [GPTQ: Accurate Post-Training Quantization for Generative Pre-trained Transformers](https://arxiv.org/abs/2210.17323) \u2014 Frantar et al., 2022\n38. [Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks](https://arxiv.org/abs/2005.11401) \u2014 Lewis et al., 2020\n39. [Red Teaming Language Models to Reduce Harms](https://arxiv.org/abs/2209.07858) \u2014 Ganguli et al., 2022\n40. [Training language models to follow instructions with human feedback (InstructGPT)](https://arxiv.org/abs/2203.02155) \u2014 Ouyang et al., 2022\n41. [Scaling Laws for Neural Language Models](https://arxiv.org/abs/2001.08361) \u2014 Kaplan et al., 2020\n42. [Training Compute-Optimal Large Language Models (Chinchilla)](https://arxiv.org/abs/2203.15556) \u2014 Hoffmann et al., 2022\n43. [Scaling Monosemanticity: Extracting Interpretable Features from Claude](https://transformer-circuits.pub/2024/scaling-monosemanticity/index.html) \u2014 Anthropic, 2024\n44. [Fast Inference from Transformers via Speculative Decoding](https://arxiv.org/abs/2211.17192) \u2014 Leviathan et al., 2022\n45. [SWE-bench: Can Language Models Resolve Real-World GitHub Issues?](https://arxiv.org/abs/2310.06770) \u2014 Jimenez et al., 2023\n46. [Toolformer: Language Models Can Teach Themselves to Use Tools](https://arxiv.org/abs/2302.04761) \u2014 Schick et al., 2023\n47. [In-Datacenter Performance Analysis of a Tensor Processing Unit](https://arxiv.org/abs/1704.04760) \u2014 Jouppi et al., 2017\n48. [Learning Transferable Visual Models From Natural Language Supervision (CLIP)](https://arxiv.org/abs/2103.00020) \u2014 Radford et al., 2021\n49. [You Only Look Once: Unified, Real-Time Object Detection](https://arxiv.org/abs/1506.02640) \u2014 Redmon et al., 2016\n50. [ZeRO: Memory Optimizations Toward Training Trillion Parameter Models](https://arxiv.org/abs/1910.02054) \u2014 Rajbhandari et al., 2019\n\n\n---\n\n## Typography\n\n### Baseline\n*Category: typography \u00b7 Tags: `layout` `spacing`*\n\nThe invisible horizontal line on which letters sit. Descenders (g, j, p, q, y) hang below it; round letters like o and e slightly overshoot it for optical correction. The baseline is the primary reference point for vertical alignment in typesetting and grid systems.\n\n---\n\n### Leading\n*Category: typography \u00b7 Tags: `spacing` `readability`*\n\nThe vertical distance between the baselines of consecutive lines of text \u2014 named after the strips of lead used to add space between lines in hot-metal typesetting. Measured in points. Tight leading (less than type size) creates density; generous leading improves readability, especially at small sizes. In CSS, the equivalent property is `line-height`.\n\n---\n\n### Kerning\n*Category: typography \u00b7 Tags: `spacing` `refinement`*\n\nThe adjustment of space between a specific pair of letters to achieve optical balance. Distinct from tracking (which adjusts spacing uniformly across a range of text). Fonts include built-in kerning tables for common pairs (AV, To, WA); manual kerning is applied on top for display or headline sizes.\n\n---\n\n### Tracking\n*Category: typography \u00b7 Tags: `spacing` `layout`*\n\nUniform letter-spacing applied across a range of text \u2014 also called letter-spacing. Tightening tracking is common in headlines and display settings; opening it up is used for small caps, uppercase-only settings, and UI labels. Should not be confused with kerning, which acts on individual letter pairs.\n\n---\n\n### X-height\n*Category: typography \u00b7 Tags: `legibility` `typeface`*\n\nThe height of lowercase letters, measured from baseline to the top of a flat letter like x or z, excluding ascenders and descenders. A high x-height generally improves legibility at small sizes and is a key differentiator between typefaces. Helvetica and Georgia both have high x-heights; Garamond is comparatively low.\n\n---\n\n### Ascender\n*Category: typography \u00b7 Tags: `letterform`*\n\nThe portion of a lowercase letter that rises above the x-height \u2014 present in b, d, f, h, i, k, l, t. Ascender height varies between typefaces; some extend well above the cap height (as in many oldstyle designs), others sit level with or below it (common in grotesques). Affects the perceived airiness of a typeface at text sizes.\n\n---\n\n### Descender\n*Category: typography \u00b7 Tags: `letterform`*\n\nThe portion of a lowercase letter that extends below the baseline \u2014 present in g, j, p, q, y. Long descenders can create elegance in display settings but cause collisions when leading is too tight. A key consideration when choosing typefaces for dense editorial or data contexts.\n\n---\n\n### Measure\n*Category: typography \u00b7 Tags: `readability` `layout`*\n\nThe width of a column of text, traditionally measured in picas or characters per line. The conventional optimal measure is 45\u201375 characters per line for comfortable reading \u2014 wider and the eye struggles to return to the next line; narrower and text feels choppy. Robert Bringhurst's *Elements of Typographic Style* gives 66 characters as an ideal for single-column text.\n\n---\n\n### Widow\n*Category: typography \u00b7 Tags: `refinement` `layout`*\n\nA single word or short line left alone at the top of a column or page, separated from the paragraph it belongs to. Considered a typographic fault \u2014 the line reads as orphaned and disrupts the visual rhythm of the page. Fixed by editing, tracking adjustment, or column depth changes. Not to be confused with an orphan.\n\n---\n\n### Orphan\n*Category: typography \u00b7 Tags: `refinement` `layout`*\n\nA single word or very short line at the end of a paragraph, sitting at the bottom of a column or page before the text continues overleaf. Weakens the visual closure of a paragraph. Fixed by editing copy, adjusting tracking, or refining column breaks. Distinct from a widow, which appears at the top of a column.\n\n---\n\n### Ligature\n*Category: typography \u00b7 Tags: `type-design` `opentype`*\n\nTwo or more letters joined as a single glyph to resolve visual or mechanical conflicts between adjacent letterforms. Common ligatures include fi, fl, ff, ffi, ffl \u2014 where the dot of i or the crossbar of f would otherwise collide. OpenType fonts include ligature substitution as a feature that can be toggled in layout software and CSS (`font-variant-ligatures`).\n\n---\n\n### Small Caps\n*Category: typography \u00b7 Tags: `opentype` `refinement`*\n\nCapital letterforms drawn at approximately x-height, used within running text for acronyms, abbreviations, and proper names to avoid the visual imbalance caused by full-sized caps alongside lowercase. True small caps are drawn with optically corrected stroke weights \u2014 not simply scaled-down capitals, which appear too light. Available as an OpenType feature (`font-variant: small-caps`).\n\n---\n\n### Serif\n*Category: typography \u00b7 Tags: `classification` `history` `letterform`*\n\nA typeface classification based on the presence of small finishing strokes (serifs) at the ends of letterform strokes. Serif typefaces \u2014 Garamond, Times New Roman, Bodoni \u2014 trace historically to Roman stone inscriptions and are traditionally associated with long-form reading and editorial contexts. **Sans-serif** typefaces have no serifs (Helvetica, Futura, Gill Sans) and are associated with modernist and screen-first contexts. **Slab serifs** have heavy, rectangular serifs with minimal stroke contrast (Rockwell, Clarendon, Archer). Classification is a first tool for making informed typeface decisions.\n\n---\n\n### Cap Height\n*Category: typography \u00b7 Tags: `letterform` `measurement`*\n\nThe height of flat uppercase letters \u2014 H, I, E, F \u2014 measured from baseline to the top of the letter. Cap height is typically slightly less than the ascender height in most typefaces, though some designs align them. A key metric when composing type with other graphic elements: rules, icons, and logos optically align to cap height rather than to the full ascender.\n\n---\n\n### Typeface / Font\n*Category: typography \u00b7 Tags: `terminology` `classification`*\n\nTwo terms consistently confused. A **typeface** is the design \u2014 Helvetica, Garamond, Times New Roman. A **font** is a specific instance of that design: Helvetica Bold Italic at 10pt. Historically, a font was a physical set of metal type in one size and style; digitally, the distinction has blurred, but designers still use *typeface* for the design and *font* for the file. \"I used the Garamond typeface\" and \"I installed three fonts\" are both correct uses.\n\n---\n\n### Display Type\n*Category: typography \u00b7 Tags: `hierarchy` `size` `classification`*\n\nType set at large sizes \u2014 typically 24pt and above \u2014 for headlines, posters, and titling. Display type is designed or selected for impact, legibility at scale, and personality; it tolerates tighter spacing and finer details than text type. Many type families include dedicated display cuts with higher contrast, tighter spacing, and more refined detail that becomes visible at scale. The opposite is **text type**: type designed for comfortable reading at 8\u201314pt.\n\n---\n\n### Italic\n*Category: typography \u00b7 Tags: `style` `letterform` `classification`*\n\nA slanted or cursive variant of a typeface, used for emphasis, citations, titles, and foreign terms. A **true italic** is a separately drawn design \u2014 often with calligraphic origins, distinct letterforms (notably single-storey *a* and *g*), and narrower proportions. An **oblique** is simply the roman slanted mechanically and is typographically less refined. Most contemporary sans-serif families use obliques; most serif families have true italics. The distinction matters in fine typography.\n\n---\n\n### Typographic Colour\n*Category: typography \u00b7 Tags: `texture` `weight` `visual`*\n\nThe overall density and tone of a block of text on a page \u2014 how light or dark, even or uneven, the text appears as a mass. Determined by typeface weight, x-height, tracking, leading, and measure. Even colour (a consistent grey tone with no rivers of white) is a mark of careful typesetting. The term borrows from visual arts: type is treated as a tonal field rather than a sequence of individual characters. Typographic colour is invisible to most readers and obvious to any typographer.\n\n---\n\n### Rag\n*Category: typography \u00b7 Tags: `alignment` `readability` `refinement`*\n\nThe uneven right edge of left-aligned (ragged-right) text. Good rag is irregular but gentle \u2014 no line dramatically shorter or longer than its neighbours. Bad rag creates awkward shapes, rivers, or patterns in the white space. Rag management is a refinement skill: adjusting line breaks, tracking, and hyphenation to produce a right edge that reads smoothly without drawing attention to itself.\n\n---\n\n### Hierarchy\n*Category: typography \u00b7 Tags: `layout` `structure` `communication`*\n\nThe visual organisation of type to communicate relative importance \u2014 distinguishing headlines from subheads, body text, captions, and marginalia. Established through size, weight, colour, spacing, position, and typeface choice. A clear typographic hierarchy guides reading order and reduces cognitive load. A flat hierarchy \u2014 everything the same size and weight \u2014 forces the reader to construct meaning without visual cues.\n\n---\n\n### Point\n*Category: typography \u00b7 Tags: `measurement` `units`*\n\nThe primary unit of type measurement in print \u2014 1 point = 1/72 inch (digital), or approximately 0.353mm. Type size, leading, and rule weights are all specified in points. 12 points = 1 pica. The point system replaced inconsistent national body sizes in the nineteenth century and is embedded in all major design software. Type set at 10pt means the type occupies a body 10 points tall \u2014 the visible letterforms are typically smaller than the full body.\n\n---\n\n### Em / En\n*Category: typography \u00b7 Tags: `measurement` `units` `spacing`*\n\nRelative typographic units that scale with type size. An **em** equals the current type size \u2014 in 12pt type, an em is 12pt wide. Used for indents, em dashes (\u2014), and spacing. An **en** is half an em, used for en dashes (\u2013) and numerical ranges (pp. 12\u201314). Because they scale proportionally, em-based measurements remain correct regardless of point size \u2014 a 1em indent looks right at both 10pt and 48pt.\n\n---\n\n## Type Design\n\n### Counter\n*Category: type design \u00b7 Tags: `letterform` `anatomy`*\n\nThe partially or fully enclosed space within a letterform. A closed counter is fully enclosed (the interior of o, p, d); an open counter is partially enclosed (the opening in c, e, s). Counter size and shape are primary determinants of a typeface's legibility at small sizes and its overall typographic colour.\n\n---\n\n### Bowl\n*Category: type design \u00b7 Tags: `letterform` `anatomy`*\n\nThe curved stroke that encloses or partially encloses the counter in letters such as b, d, g, o, p, q. The shape of the bowl \u2014 how round, oval, or compressed it is \u2014 defines much of a typeface's personality and historical classification. Humanist typefaces tend to have rounder, more calligraphic bowls; grotesques more compressed and regular ones.\n\n---\n\n### Stem\n*Category: type design \u00b7 Tags: `letterform` `anatomy`*\n\nThe main vertical stroke of a letterform. In most typefaces the stem is the thickest stroke, contrasting with thinner horizontal and diagonal strokes. The weight and proportion of the stem relative to other strokes determines the typeface's contrast \u2014 a key variable in classification from hairline-contrast modern faces to near-monolinear grotesques.\n\n---\n\n### Terminal\n*Category: type design \u00b7 Tags: `letterform` `anatomy`*\n\nThe end of a stroke that does not terminate in a serif. Terminals can be cut at various angles (diagonal, horizontal, or vertical) or be rounded, tapered, or ball-shaped \u2014 characteristics used to distinguish type families and historical periods. The terminal of the arm of r or the tail of a are often among the most distinctive features of a typeface.\n\n---\n\n### Aperture\n*Category: type design \u00b7 Tags: `letterform` `legibility`*\n\nThe opening of a partially enclosed counter \u2014 the degree to which forms like a, c, e, g, s are open or closed. High aperture (open forms) generally improves legibility at small sizes and in low-resolution environments because the reader can resolve the letterform from fewer cues. Low aperture creates a more enclosed, darker typographic colour.\n\n---\n\n### Overshoot\n*Category: type design \u00b7 Tags: `optical` `precision`*\n\nThe degree to which round and pointed letterforms (O, C, A, V) extend slightly beyond the baseline, cap height, or x-height. Necessary for optical correction: a circle aligned exactly to a flat cap height appears shorter than a square of the same height because the eye registers the contact area of the curve as smaller. Overshoot is invisible in good type and glaring when absent.\n\n---\n\n### Variable Font\n*Category: type design \u00b7 Tags: `opentype` `variable` `web`*\n\nA single font file in which multiple design variations are encoded as continuous axes \u2014 typically weight, width, and optical size, but potentially any parameter the type designer defines. A variable font replaces what would previously have been dozens of separate font files. Supported across all major browsers and applications; allows fine-grained typographic control through CSS (`font-variation-settings`).\n\n---\n\n### Optical Size `opsz`\n*Category: type design \u00b7 Tags: `variable` `legibility`*\n\nA type variant optimised for a specific size range. At small sizes, optical size variants typically feature heavier hairlines, wider letterforms, larger counters, and more generous spacing to preserve legibility. At large display sizes, variants have finer details, tighter spacing, and more pronounced contrast. In variable fonts this is exposed as the `opsz` axis, and can be set automatically in CSS with `font-optical-sizing: auto`.\n\n---\n\n### Ink Trap\n*Category: type design \u00b7 Tags: `optical` `production` `letterform`*\n\nA deliberate concavity cut into the junction where two strokes meet \u2014 where stems join, at the base of bowls, or at the entry of arches. At small sizes, ink spreads into tight corners during printing; ink traps pre-empt this by removing material that would otherwise fill and blur. Originally a printing necessity, ink traps have become an aesthetic feature \u2014 most visibly in Bell Centennial (designed for telephone directories at tiny sizes) and more recently in display typefaces where the traps read as a distinctive formal characteristic.\n\n---\n\n### Sidebearing\n*Category: type design \u00b7 Tags: `spacing` `glyph` `measurement`*\n\nThe white space on either side of a glyph, built into the font as part of its advance width. The left sidebearing is the distance from the glyph's left edge to the leftmost point of the letterform; the right sidebearing from the rightmost point to the right edge. Sidebearings determine the default spacing between characters; well-drawn sidebearing values create consistent optical spacing across combinations without requiring extensive manual kerning.\n\n---\n\n### Glyph\n*Category: type design \u00b7 Tags: `character` `encoding` `opentype`*\n\nA specific visual representation of a character or symbol in a font. A single character (the letter 'a') may have multiple glyphs in one font \u2014 the standard a, a small caps a, a swash variant, a stylistic alternate. Fonts are collections of glyphs; character sets define which characters are supported; OpenType features control which glyphs are substituted in context. The distinction between *character* (an abstract identity) and *glyph* (a specific drawn form) matters in advanced typography and font development.\n\n---\n\n### Type Family\n*Category: type design \u00b7 Tags: `classification` `weight` `style`*\n\nA collection of related typefaces sharing a common design but varying in weight (light, regular, bold, black), width (condensed, normal, extended), and style (roman, italic). A complete family provides a typographic system for a full project \u2014 allowing contrast and hierarchy without resorting to unrelated typefaces. Families range from modest (two weights with italics) to extensive superfamilies of 60+ styles designed as a coherent system: Univers, Freight, and S\u00f6hne are examples.\n\n---\n\n## Book Design\n\n### Recto\n*Category: book design \u00b7 Tags: `print` `layout`*\n\nThe right-hand page of an open spread \u2014 always odd-numbered. In most Western book conventions, chapters begin on a recto. The term comes from the Latin *recto folio* (right-hand leaf). Understanding recto/verso is fundamental to designing book layouts, as content and margin hierarchies differ between the two.\n\n---\n\n### Verso\n*Category: book design \u00b7 Tags: `print` `layout`*\n\nThe left-hand page of an open spread \u2014 always even-numbered. Conventionally the verso carries the running head and page number on its outer (left) edge. The back of a single sheet is also referred to as its verso, with the front being the recto.\n\n---\n\n### Folio\n*Category: book design \u00b7 Tags: `print` `layout`*\n\nThe page number as it appears on the printed page. Folios can be positioned in the running head/foot or independently. Some pages \u2014 such as chapter openings, full-bleed images, and prelims \u2014 carry a *blind folio* (counted but not printed) or are unnumbered entirely. Folio style and placement is a key micro-decision in book design.\n\n---\n\n### Gutter\n*Category: book design \u00b7 Tags: `print` `layout`*\n\nThe inner margin of a page \u2014 the space between the text area and the spine. In a bound book, some of this space is physically consumed by the binding and becomes invisible. Gutters must be generous enough that text isn't swallowed into the spine; the required allowance depends on the binding method and the book's thickness.\n\n---\n\n### Bleed\n*Category: book design \u00b7 Tags: `print` `production`*\n\nArtwork or colour that extends beyond the intended trim edge of a printed page, typically by 3mm. Bleed is necessary because cutting machines have a small margin of error \u2014 if artwork ends exactly at the trim line, a slight miscut reveals an unprinted white edge. Any printed element that runs to the edge of the page must be set up with bleed in the artwork.\n\n---\n\n### Colophon\n*Category: book design \u00b7 Tags: `print` `history`*\n\nA note \u2014 usually at the end of a book \u2014 recording production details: the typefaces used, the paper stock, the printer, the edition size. In fine press and artist's book tradition, the colophon is itself a designed element. The term derives from a Greek word meaning 'summit' or 'finishing touch'. Historically it also appeared on the title page before standardised title-page conventions emerged.\n\n---\n\n### Signature\n*Category: book design \u00b7 Tags: `print` `production`*\n\nA section of pages made by folding a single large printed sheet. Common signature sizes are 8, 16, and 32 pages, depending on the press format. The finished book is assembled by gathering and binding multiple signatures. Page counts in professionally printed books are typically divisible by signature size \u2014 understanding this is essential when planning book lengths with a printer.\n\n---\n\n### Prelims\n*Category: book design \u00b7 Tags: `print` `editorial`*\n\nThe preliminary pages of a book \u2014 everything before the main text begins. Typically includes: half-title, frontispiece (if any), title page, copyright/imprint page, dedication, contents, foreword, and preface. Prelims are conventionally paginated in roman numerals and their design establishes the visual register for the whole book.\n\n---\n\n### Running Head\n*Category: book design \u00b7 Tags: `navigation` `editorial`*\n\nThe repeated title, chapter name, or section title set at the top (or occasionally bottom) of each page as a navigational aid. Typically, recto running heads carry the chapter title and verso heads the book title, though conventions vary. Running heads are set in small caps or a reduced size of the text face and are often the first typographic element cut when space is tight.\n\n---\n\n### Perfect Binding\n*Category: book design \u00b7 Tags: `print` `production`*\n\nA binding method in which pages are glued directly to a square spine \u2014 the standard construction for paperback books and many magazines. The pages are ground at the spine edge and adhesive is applied, then a paper cover is wrapped around. Cheaper and faster than case binding but less durable; pages can crack and detach if the book is opened too flat.\n\n---\n\n### Saddle-Stitch\n*Category: book design \u00b7 Tags: `print` `production`*\n\nA binding method where folded sheets are nested and stapled through the fold \u2014 the standard for thin booklets, zines, and some magazines (including early Eye Magazine issues). Limited to thinner publications (typically under 64 pages). The flat, open-flat quality and ease of production make it the default for student-produced zines and studio publications.\n\n---\n\n### Spread\n*Category: book design \u00b7 Tags: `layout` `print`*\n\nTwo facing pages viewed simultaneously \u2014 a left-hand (verso) and right-hand (recto) page. The spread is the primary unit of book design; layouts must work both page-by-page and as spreads, where image, type, and white space are balanced across the gutter. Full-bleed images crossing the gutter (a double-page spread) require precise imposition to align correctly after binding \u2014 the image is split across two pages that must register perfectly when the book is opened.\n\n---\n\n### Trim\n*Category: book design \u00b7 Tags: `print` `production`*\n\nThe finished size of a printed page after cutting. Books are printed on large sheets, folded into signatures, and trimmed to size. The trim size determines everything from paper sheet selection to typographic margins. Common UK book trim sizes include A5 (148\u00d7210mm), Royal (156\u00d7234mm), and Demy (138\u00d7216mm). Artwork must include bleed \u2014 typically 3mm \u2014 beyond the trim edge to allow for cutting tolerances.\n\n---\n\n### Case Binding\n*Category: book design \u00b7 Tags: `print` `production` `craft`*\n\nThe construction method for hardcover books. Printed and folded signatures are sewn together (the book block), then attached to a rigid cover (the case) of board covered in cloth, paper, or leather. More durable and prestigious than perfect binding; the book opens flat and withstands repeated use. The case is made separately from the book block and attached via endpapers. Standard for fine books, monographs, and any publication intended for long life.\n\n---\n\n### Endpapers\n*Category: book design \u00b7 Tags: `print` `material` `craft`*\n\nThe pages that connect a hardcover case to the book block \u2014 one leaf glued to the inner cover board (the pastedown), one free (the flyleaf). Endpapers are typically heavier stock than the text pages. In fine press and art book traditions, endpapers are a significant design decision \u2014 material, colour, pattern, and printing all contribute to the book's character before the reader reaches page one. Irma Boom is particularly noted for considered endpaper design in her artist's books.\n\n---\n\n## Grid & Layout\n\n### Grid\n*Category: grid & layout \u00b7 Tags: `structure` `Swiss` `systems`*\n\nA system of horizontal and vertical lines dividing the page into fields, providing a consistent framework for placing type and image. The grid is the primary tool of systematic graphic design \u2014 Emil Ruder and Josef M\u00fcller-Brockmann developed grid methodology in the Swiss Style tradition; *Grid Systems in Graphic Design* (M\u00fcller-Brockmann, 1981) remains the definitive text. Grids range from simple two-column structures to complex modular grids with multiple fields and intervals. The discipline is using the grid rigorously while knowing when and how to break it.\n\n---\n\n### Column Grid\n*Category: grid & layout \u00b7 Tags: `layout` `columns` `print`*\n\nA page divided into a set number of vertical columns separated by gutters. Elements are placed across one or more columns. A three-column grid offers flexibility \u2014 body text in two columns, marginal notes in a third, or content spanning all three. Column count is chosen relative to the measure: at A4, a three-column grid gives each column a comfortable reading width; more columns produce narrow fields suitable for captions, data, or image grids rather than extended text.\n\n---\n\n### Baseline Grid\n*Category: grid & layout \u00b7 Tags: `layout` `alignment` `vertical rhythm`*\n\nA horizontal grid of regularly spaced lines corresponding to the body text leading, used to align elements vertically across columns and pages. When text sits on the baseline grid throughout a publication, it achieves vertical rhythm \u2014 a consistent cadence through the page. Text, captions, and page numbers on the same grid will align when two pages are held to the light. Baseline grids are standard in InDesign and are the foundation of rigorous editorial design.\n\n---\n\n### Margin\n*Category: grid & layout \u00b7 Tags: `layout` `white space` `proportion`*\n\nThe white space between the text area and the edge of the page \u2014 head, tail, inner (gutter), and outer. Classic book proportion follows the Van de Graaf canon, giving the inner margin the smallest value and the outer and tail margins progressively larger, creating a stable visual centre of gravity. Margins frame the text area, provide space for the reader's thumbs, and accommodate running heads and folios. Generous margins signal quality; tight margins signal economy or poor typographic judgement.\n\n---\n\n### White Space\n*Category: grid & layout \u00b7 Tags: `negative space` `layout` `hierarchy`*\n\nThe empty, unmarked areas of a page \u2014 around and between elements of content. Not absent by default but active by design: white space gives the eye rest, separates and groups content, establishes hierarchy, and signals editorial confidence. Generous white space is associated with luxury, restraint, and contemporary minimal design; insufficient white space creates visual noise. The term *negative space* is used interchangeably, particularly when the shape of the space is itself meaningful.\n\n---\n\n## Print Production\n\n### Letterpress\n*Category: print production \u00b7 Tags: `relief printing` `history` `craft`*\n\nA relief printing process in which raised type or plates are inked and pressed directly onto paper, leaving a physical impression. The dominant method of book and commercial printing for five hundred years after Gutenberg, displaced by offset lithography in the twentieth century. Revived as a craft practice for stationery, small editions, and fine press work \u2014 valued for the tactile debossed impression and the ink density achievable by pressing into the paper. St Bride Foundation runs active letterpress workshops open to students.\n\n---\n\n### Screen Printing\n*Category: print production \u00b7 Tags: `craft` `colour` `surface`*\n\nA printing technique in which ink is pushed through a mesh stencil onto the substrate \u2014 each colour requires a separate screen and print pass. Suited to bold, flat areas of colour and works on almost any surface: paper, fabric, wood, metal, plastic. Common for posters, garment printing, and short-run artist publications. **Risograph** is a related studio technique using a thermal stencil and soy-based inks on a digital duplicator \u2014 faster and cheaper than screen printing, with characteristic colour bleed, texture, and a limited colour palette of pre-made ink drums.\n\n---\n\n### Offset Lithography\n*Category: print production \u00b7 Tags: `commercial print` `process` `volume`*\n\nThe dominant commercial printing process. Ink is transferred (offset) from a plate to a rubber blanket, then to the paper \u2014 the plate never contacts the paper directly. Based on the principle that oil and water repel: image areas accept ink, non-image areas accept water. Produces consistent, high-quality colour at volume; most books, magazines, and large-format print jobs are produced this way. Digital print displaces offset for short runs, but offset remains standard for 500+ copies where consistency and cost-per-unit matter.\n\n---\n\n### CMYK\n*Category: print production \u00b7 Tags: `colour` `process` `four-colour`*\n\nThe four-colour process used in commercial printing: Cyan, Magenta, Yellow, and Key (Black). All visible print colours are approximated by overprinting halftone dots of these four inks. CMYK has a narrower colour gamut than RGB screens \u2014 bright oranges, vivid greens, and neons are difficult to reproduce. Designers working in print must convert from RGB to CMYK before sending to press and should proof carefully. Spot colours (Pantone) supplement CMYK when exact colour matching is critical for brand or identity work.\n\n---\n\n### GSM\n*Category: print production \u00b7 Tags: `paper` `weight` `material`*\n\nGrams per Square Metre \u2014 the standard measure of paper weight. 80gsm is standard office paper; 90\u2013100gsm is typical for book pages; 130\u2013170gsm for magazines; 300gsm+ for card and cover stock. GSM alone doesn't determine quality \u2014 thickness (caliper), opacity, surface finish, and brightness all affect the result. Uncoated stocks have a warmer, more tactile feel; coated stocks give crisper image reproduction. The choice between coated and uncoated significantly affects how type and images appear when printed.\n\n---\n\n### Spot Colour\n*Category: print production \u00b7 Tags: `Pantone` `colour matching` `branding`*\n\nA specially mixed ink printed as a single layer, separate from the four-colour CMYK process. Spot colours \u2014 most commonly from the Pantone Matching System (PMS) \u2014 allow exact colour specification and consistent reproduction across different substrates and print processes. Critical for brand identities where a specific colour must match reliably. Spot colours can achieve effects outside the CMYK gamut: metallics, fluorescents, and custom shades. Each additional spot colour increases print cost; most jobs are 4-colour process with one or two spot colours added for brand elements.\n\n---\n\n## Wayfinding\n\n### Wayfinding\n*Category: wayfinding \u00b7 Tags: `navigation` `environmental` `systems`*\n\nThe design of systems that help people orient and navigate in physical environments \u2014 airports, hospitals, transport networks, campuses, and cities. Encompasses signage, maps, pictograms, colour coding, and digital information displays. Key practitioners include Jock Kinneir and Margaret Calvert (UK road signs and British Rail), Paul Mijksenaar (Schiphol Airport), and studios including Pentagram and Applied Wayfinding. Good wayfinding is invisible in use \u2014 it resolves spatial anxiety before it arises, working across languages and literacy levels through universal graphic language.\n\n---\n\n### Pictogram\n*Category: wayfinding \u00b7 Tags: `symbol` `navigation` `communication`*\n\nA simplified graphic symbol representing an object, action, or concept \u2014 designed to communicate across language and literacy barriers. Pictograms are the primary visual language of wayfinding (exit, toilet, no entry) but also appear in Olympic sports graphics, public information campaigns, and interface design as icons. Effective pictograms must be legible at small sizes and from a distance, immediately comprehensible to first-time users, and as culturally universal as possible. ISOTYPE, developed by Otto Neurath and Gerd Arntz in the 1920s, is the founding system of modern pictographic communication.\n\n---\n\n### Information Design\n*Category: wayfinding \u00b7 Tags: `data` `communication` `systems`*\n\nThe practice of structuring and presenting information to support understanding, decision-making, and navigation. Distinct from decoration \u2014 information design is functional first. Encompasses data visualisation, diagrams, timetables, maps, instructional graphics, and wayfinding systems. Key figures include Edward Tufte (*The Visual Display of Quantitative Information*, 1983), Richard Saul Wurman (who coined 'information architecture'), and Muriel Cooper, whose work at MIT Media Lab anticipated interactive information environments decades before they existed.\n\n---\n";
const INLINE_TUTORIALS = "# GD Digest \u2014 Tutorials\n\nCurated tutorials for key tools in the directory \u2014 vetted starting points at each level, with clear prerequisite knowledge stated upfront.\n\n16 tutorials \u00b7 Last updated Feb\u00b726\n\n---\n\n## Tutorials\n\n### Tutorial \u00b7 Figma \u2014 Essentials\n*Tool: Figma \u00b7 Platform: YouTube \u00b7 Level: Beginner \u00b7 Requires: None*\n\nFigma's own YouTube channel publishes a structured introduction to the core interface \u2014 frames, layers, vector drawing, components, and basic prototyping. The clearest starting point before any other Figma content. Covers everything needed to set up and navigate your first working file.\n\n[Figma on YouTube](https://www.youtube.com/@Figma)\n\n---\n\n### Tutorial \u00b7 Figma \u2014 Auto Layout\n*Tool: Figma \u00b7 Platform: Written \u00b7 Level: Intermediate \u00b7 Requires: Figma basics \u2014 frames, layers, components*\n\nFigma's official Auto Layout documentation is the most complete reference for building responsive, content-aware layouts. Essential for moving from static compositions to production-ready component systems. Covers alignment, padding, spacing modes, and nested Auto Layout.\n\n[Figma Help \u2014 Auto Layout](https://help.figma.com/hc/en-us/articles/360040451373)\n\n---\n\n### Tutorial \u00b7 Figma \u2014 Design Systems\n*Tool: Figma \u00b7 Platform: Written \u00b7 Level: Advanced \u00b7 Requires: Components, Auto Layout, Variables*\n\nFigma's own learning resource for design systems covers structuring reusable components, establishing shared styles and token hierarchies, and managing handoff. Written for designers working across teams or maintaining a consistent visual language across multiple files.\n\n[figma.com/resources/learn-design/design-systems](https://www.figma.com/resources/learn-design/design-systems/)\n\n---\n\n### Tutorial \u00b7 Blender \u2014 Beginner Tutorial Series\n*Tool: Blender \u00b7 Platform: YouTube \u00b7 Level: Beginner \u00b7 Requires: None*\n\nBlender Guru's donut tutorial is the most widely followed introduction to Blender \u2014 covering the interface, basic modelling, shading with nodes, lighting, and rendering through building a photorealistic scene. The canonical starting point for nearly everyone in the Blender community.\n\n[Blender Guru on YouTube](https://www.youtube.com/@blenderguru)\n\n---\n\n### Tutorial \u00b7 Blender \u2014 Shader Nodes\n*Tool: Blender \u00b7 Platform: YouTube \u00b7 Level: Intermediate \u00b7 Requires: Blender basics \u2014 interface, modelling, rendering*\n\nA focused introduction to Blender's node-based material system \u2014 covering Principled BSDF, texture mapping, procedural generation, and combining nodes to build complex surface materials. Default Cube's tutorials are technically clear and well-paced.\n\n[Default Cube on YouTube](https://www.youtube.com/@DefaultCube)\n\n---\n\n### Tutorial \u00b7 Blender \u2014 Geometry Nodes\n*Tool: Blender \u00b7 Platform: YouTube \u00b7 Level: Advanced \u00b7 Requires: Blender intermediate, basic understanding of maths and logic*\n\nGeometry Nodes is Blender's parametric and procedural modelling system \u2014 enabling generative, data-driven 3D work without manual modelling. The Blender Foundation's own tutorial series is the most reliable introduction, covering the fundamentals of the node graph, instancing, and fields.\n\n[Blender Foundation on YouTube](https://www.youtube.com/@BlenderFoundation)\n\n---\n\n### Tutorial \u00b7 TouchDesigner \u2014 Fundamentals\n*Tool: TouchDesigner \u00b7 Platform: YouTube \u00b7 Level: Beginner \u00b7 Requires: None*\n\nbileam tschepe (elekktronaut) publishes free foundational tutorials covering the TouchDesigner operator network \u2014 the five operator families (TOP, CHOP, SOP, MAT, DAT), wiring, parameters, and building a first interactive patch. The most widely recommended starting point in the community.\n\n[elekktronaut on YouTube](https://www.youtube.com/@elekktronaut)\n\n---\n\n### Tutorial \u00b7 TouchDesigner \u2014 The Interactive & Immersive HQ\n*Tool: TouchDesigner \u00b7 Platform: YouTube \u00b7 Level: Intermediate \u00b7 Requires: TouchDesigner basics \u2014 operator families, parameters*\n\nThe Interactive & Immersive HQ covers intermediate TouchDesigner techniques \u2014 CHOP-to-SOP data flow, instancing, particle systems, and building modular reusable networks. Well-structured series format with practical project-based examples.\n\n[The Interactive & Immersive HQ on YouTube](https://www.youtube.com/@TheInteractiveImmersiveHQ)\n\n---\n\n### Tutorial \u00b7 TouchDesigner \u2014 Python Scripting\n*Tool: TouchDesigner \u00b7 Platform: Written \u00b7 Level: Advanced \u00b7 Requires: TouchDesigner intermediate, basic Python*\n\nTouchDesigner's official documentation covers scripting with Python \u2014 accessing and modifying operators, handling external data, building custom expressions, and automating workflows. The Scripting section of the Derivative wiki is the authoritative reference.\n\n[derivative.ca/wiki \u2014 Python](https://docs.derivative.ca/Python)\n\n---\n\n### Tutorial \u00b7 Affinity Designer \u2014 Fundamentals\n*Tool: Affinity Suite \u00b7 Platform: YouTube \u00b7 Level: Beginner \u00b7 Requires: None*\n\nAffinity's official YouTube channel publishes structured beginner tutorials for each application. The Designer Fundamentals series covers the vector and pixel personas, core drawing tools, pen tool, layers, and document setup. The most reliable starting point for someone new to the suite.\n\n[Affinity on YouTube](https://www.youtube.com/@affinitybyserif)\n\n---\n\n### Tutorial \u00b7 Affinity Publisher \u2014 Editorial Layout\n*Tool: Affinity Suite \u00b7 Platform: YouTube \u00b7 Level: Intermediate \u00b7 Requires: Basic Affinity Designer or Publisher \u2014 document setup, layers*\n\nCovers Affinity Publisher's multi-page editorial workflow \u2014 master pages, text frame linking, paragraph and character styles, image placement, and building a complete multi-page document. Essential for anyone using Publisher for book design, magazines, or long-form print projects.\n\n[Affinity on YouTube](https://www.youtube.com/@affinitybyserif)\n\n---\n\n### Tutorial \u00b7 Affinity Suite \u2014 Print Production\n*Tool: Affinity Suite \u00b7 Platform: Written \u00b7 Level: Advanced \u00b7 Requires: Affinity Publisher, print terminology (bleed, CMYK, PDF/X)*\n\nAffinity's documentation and official help centre cover professional print export \u2014 setting bleed, crop marks, colour profiles, PDF/X presets, and preflight. Essential before sending any file to a commercial printer. The Print Production section of the Workbooks is the most structured reference.\n\n[affinity.serif.com/workbooks](https://affinity.serif.com/workbooks/)\n\n---\n\n### Tutorial \u00b7 Figma Essential Training \u2014 LinkedIn Learning\n*Tool: Figma \u00b7 Platform: LinkedIn Learning \u00b7 Level: Beginner \u00b7 Requires: None*\n\nLinkedIn Learning's Figma Essential Training covers the full core workflow \u2014 setting up files, working with frames and components, applying styles, and building a prototype. Structured as a self-paced course with short chapters. Available free through Sheffield Hallam's institutional LinkedIn Learning access.\n\n[linkedin.com/learning \u2014 Figma Essential Training](https://www.linkedin.com/learning/figma-essential-training-the-basics)\n\n---\n\n### Tutorial \u00b7 Blender Essential Training \u2014 LinkedIn Learning\n*Tool: Blender \u00b7 Platform: LinkedIn Learning \u00b7 Level: Beginner \u00b7 Requires: None*\n\nLinkedIn Learning's Blender Essential Training covers the interface, navigation, basic modelling, materials, lighting, and rendering. A more structured, chapter-based alternative to YouTube tutorials \u2014 useful if you prefer a linear, course-style progression. Available free through Sheffield Hallam's institutional LinkedIn Learning access.\n\n[linkedin.com/learning \u2014 Blender Essential Training](https://www.linkedin.com/learning/blender-essential-training)\n\n---\n\n### Tutorial \u00b7 Affinity Designer Essential Training \u2014 LinkedIn Learning\n*Tool: Affinity Suite \u00b7 Platform: LinkedIn Learning \u00b7 Level: Beginner \u00b7 Requires: None*\n\nLinkedIn Learning's Affinity Designer Essential Training covers the core vector workflow \u2014 the toolbar, pen tool, layers, symbols, and exporting assets. A well-paced starting point for anyone approaching the suite for the first time. Available free through Sheffield Hallam's institutional LinkedIn Learning access.\n\n[linkedin.com/learning \u2014 Affinity Designer Essential Training](https://www.linkedin.com/learning/affinity-designer-essential-training)\n\n---\n\n### Tutorial \u00b7 TouchDesigner for Beginners \u2014 LinkedIn Learning\n*Tool: TouchDesigner \u00b7 Platform: LinkedIn Learning \u00b7 Level: Beginner \u00b7 Requires: None*\n\nLinkedIn Learning's TouchDesigner for Beginners course covers setting up your first network, understanding operator families, connecting TOPs and CHOPs, and building a basic interactive patch. A more structured entry point alongside elekktronaut's community tutorials. Available free through Sheffield Hallam's institutional LinkedIn Learning access.\n\n[linkedin.com/learning \u2014 TouchDesigner](https://www.linkedin.com/learning/search?keywords=touchdesigner)\n\n---\n";
